<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f172a">
<meta name="apple-mobile-web-app-title" content="FlowLog TMS">
<title>Cal Delivery — FlowLog TMS Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; }

  /* ── Header ── */
  .header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); border-bottom: 1px solid #334155; padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; min-height: 0; }
  .header h1 { font-size: 18px; font-weight: 700; color: #f8fafc; white-space: nowrap; }
  .header h1 span { color: #3b82f6; }
  .header .sub { font-size: 12px; color: #94a3b8; margin-top: 2px; }
  .badge { background: #1e3a5f; color: #60a5fa; padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap; }
  .hdr-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
  .hdr-info { font-size: 12px; color: #94a3b8; white-space: nowrap; }

  /* ── Mobile menu button (hidden on desktop) ── */
  .mobile-menu-btn { display: none; background: none; border: 1px solid #475569; color: #94a3b8; border-radius: 6px; padding: 6px 10px; font-size: 20px; cursor: pointer; line-height: 1; }
  .mobile-menu-btn:hover { color: #e2e8f0; border-color: #60a5fa; }

  /* ── Nav ── */
  .nav { background: #1e293b; border-bottom: 1px solid #334155; padding: 0 24px; display: flex; flex-direction: column; }
  .nav-row { display: flex; align-items: center; justify-content: space-between; width: 100%; }
  .nav-tabs { display: flex; gap: 0; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 1; min-width: 0; }
  .nav-tabs::-webkit-scrollbar { display: none; }
  .nav button { background: none; border: none; color: #94a3b8; padding: 10px 14px; font-size: 13px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
  .nav button:hover { color: #e2e8f0; background: #334155; }
  .nav button.active { color: #3b82f6; border-bottom-color: #3b82f6; }

  /* ── Filters — own row ── */
  .filters { display: flex; align-items: center; gap: 8px; padding: 8px 0; flex-wrap: wrap; border-top: 1px solid #1e293b; }
  .filters select { background: #334155; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer; max-width: 140px; }
  .filters select:focus { outline: none; border-color: #3b82f6; }
  .preset-btn { background: #334155; color: #94a3b8; border: 1px solid #475569; border-radius: 6px; padding: 5px 10px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .preset-btn:hover { color: #e2e8f0; border-color: #60a5fa; }
  .preset-btn.active { background: #1e3a5f; color: #60a5fa; border-color: #3b82f6; }
  .filter-label { font-size: 11px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }

  /* ── Main content ── */
  .main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  /* ── KPI grid ── */
  .kpi-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
  .kpi { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px; }
  .kpi .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  .kpi .value { font-size: 24px; font-weight: 700; color: #f8fafc; }
  .kpi .change { font-size: 12px; margin-top: 4px; }
  .kpi .up { color: #4ade80; }
  .kpi .down { color: #f87171; }

  /* ── Cards & Grid ── */
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; margin-bottom: 20px; overflow-x: auto; }
  .card h3 { font-size: 16px; font-weight: 600; color: #f8fafc; margin-bottom: 16px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: #94a3b8; padding: 10px 12px; border-bottom: 1px solid #334155; position: sticky; top: 0; background: #1e293b; }
  td { padding: 10px 12px; border-bottom: 1px solid #0f172a; font-size: 14px; }
  tr:hover td { background: #334155; }
  .r { text-align: right; }

  .pill { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600; }
  .pg { background: #064e3b; color: #6ee7b7; }
  .pa { background: #78350f; color: #fbbf24; }
  .pr { background: #7f1d1d; color: #fca5a5; }

  .loading { display: flex; align-items: center; justify-content: center; min-height: 400px; font-size: 18px; color: #94a3b8; }
  .spin { width: 24px; height: 24px; border: 3px solid #334155; border-top-color: #3b82f6; border-radius: 50%; animation: sp 0.8s linear infinite; display: inline-block; margin-right: 12px; vertical-align: middle; }
  @keyframes sp { to { transform: rotate(360deg); } }

  .chart-wrap { position: relative; height: 320px; }
  .chart-wrap-sm { position: relative; height: 260px; }
  .range-info { font-size: 12px; color: #64748b; padding: 4px 0; }

  /* Config/Settings styles */
  .cfg-section { margin-bottom: 32px; }
  .cfg-section h3 { font-size: 16px; font-weight: 600; color: #f8fafc; margin-bottom: 12px; }
  .cfg-toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .cfg-input { background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 6px; padding: 8px 12px; font-size: 13px; }
  .cfg-input:focus { outline: none; border-color: #3b82f6; }
  .cfg-input::placeholder { color: #64748b; }
  .cfg-btn { padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.15s; }
  .cfg-btn-primary { background: #3b82f6; color: white; }
  .cfg-btn-primary:hover { background: #2563eb; }
  .cfg-btn-danger { background: #7f1d1d; color: #fca5a5; }
  .cfg-btn-danger:hover { background: #991b1b; }
  .cfg-btn-sm { padding: 4px 10px; font-size: 11px; }
  .cfg-search { width: 260px; }
  .cfg-toast { position: fixed; bottom: 24px; right: 24px; background: #065f46; color: #6ee7b7; padding: 12px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; z-index: 9999; display: none; }
  .cfg-toast.error { background: #7f1d1d; color: #fca5a5; }
  .cfg-count { font-size: 12px; color: #64748b; }
  .unmatched-row { background: #1a1a2e; }
  .unmatched-row td:first-child::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #f59e0b; border-radius: 50%; margin-right: 8px; }

  .info-tip { position: relative; display: inline-block; cursor: help; }
  .info-tip .info-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #334155; color: #94a3b8; font-size: 10px; font-weight: 700; font-style: normal; margin-left: 6px; vertical-align: middle; }
  .info-tip .info-text { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #475569; color: #e2e8f0; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: 400; line-height: 1.5; white-space: normal; width: 280px; z-index: 100; box-shadow: 0 4px 12px rgba(0,0,0,.4); }
  .info-tip:hover .info-text { display: block; }
  /* ── Tablet (≤1024px) ── */
  @media (max-width: 1024px) {
    .kpi-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .grid-2 { grid-template-columns: 1fr; }
    .header { padding: 10px 16px; }
    .nav { padding: 0 16px; }
    .main { padding: 16px; }
    .hdr-info { display: none; }
    .nav button { padding: 10px 12px; font-size: 12px; }
  }

  /* ── Small tablet / large phone (≤768px) ── */
  @media (max-width: 768px) {
    .mobile-menu-btn { display: block; }
    .header h1 { font-size: 16px; }
    .header .sub { display: none; }
    .hdr-right { gap: 8px; }
    .kpi-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .kpi { padding: 14px; }
    .kpi .value { font-size: 20px; }

    /* Nav becomes collapsible on mobile */
    .nav { padding: 0 12px; }
    .nav-tabs { display: none; flex-direction: column; width: 100%; }
    .nav-tabs.mobile-open { display: flex; }
    .nav button { padding: 12px 16px; font-size: 14px; border-bottom: none; border-left: 3px solid transparent; text-align: left; }
    .nav button.active { border-left-color: #3b82f6; border-bottom-color: transparent; }
    .nav button:hover { background: #0f172a; }

    .export-bar { padding: 4px 12px; }
    .export-bar .export-btn { font-size: 11px; padding: 4px 10px; }
    .filters { padding: 8px 0; gap: 6px; }
    .filter-label { font-size: 10px; }
    .filters select { font-size: 11px; padding: 5px 8px; max-width: 120px; }
    .preset-btn { padding: 4px 8px; font-size: 10px; }

    .card { padding: 14px; border-radius: 10px; }
    .card h3 { font-size: 14px; margin-bottom: 12px; }
    .chart-wrap { height: 250px; }
    .chart-wrap-sm { height: 200px; }

    table { font-size: 12px; }
    th { font-size: 10px; padding: 8px 6px; }
    td { padding: 8px 6px; font-size: 12px; }

    .cfg-section { margin-bottom: 20px; }
    .cfg-toolbar { flex-direction: column; align-items: stretch; }
    .cfg-search { width: 100%; }
    .cfg-btn { width: 100%; text-align: center; }

    .login-box { padding: 24px 20px; width: 100%; max-width: 100vw; border-radius: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  }

  /* ── Phone (≤480px) ── */
  @media (max-width: 480px) {
    .header { padding: 8px 12px; gap: 6px; }
    .header h1 { font-size: 15px; }
    .hdr-right { width: 100%; justify-content: space-between; }
    .depot-badge { font-size: 10px; padding: 2px 8px; }
    .depot-toggle button { padding: 4px 10px; font-size: 10px; }
    .user-info { font-size: 11px; }
    .logout-btn { font-size: 11px; padding: 3px 8px; }

    .main { padding: 12px 10px; }
    .kpi-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
    .kpi { padding: 12px; border-radius: 8px; }
    .kpi .label { font-size: 10px; margin-bottom: 4px; }
    .kpi .value { font-size: 18px; }
    .kpi .change { font-size: 11px; }

    .card { padding: 12px; border-radius: 8px; margin-bottom: 12px; }
    .grid-2 { gap: 12px; margin-bottom: 12px; }
    .chart-wrap { height: 220px; }
    .chart-wrap-sm { height: 180px; }

    .filters { flex-wrap: wrap; }
    .filters select { flex: 1; min-width: 80px; }

    .nav { padding: 0 10px; }
  }

  /* ── Safe area insets for notched phones ── */
  @supports (padding: env(safe-area-inset-top)) {
    .header { padding-top: calc(12px + env(safe-area-inset-top)); padding-left: calc(16px + env(safe-area-inset-left)); padding-right: calc(16px + env(safe-area-inset-right)); }
    .main { padding-left: calc(16px + env(safe-area-inset-left)); padding-right: calc(16px + env(safe-area-inset-right)); padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
  }

  /* Login screen */
  .login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #0f172a; }
  .login-box { background: #1e293b; border: 1px solid #334155; border-radius: 16px; padding: 40px; width: 400px; max-width: 90vw; }
  .login-box h2 { font-size: 22px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; text-align: center; }
  .login-box h2 span { color: #3b82f6; }
  .login-box .login-sub { font-size: 13px; color: #94a3b8; text-align: center; margin-bottom: 28px; }
  .login-box label { display: block; font-size: 12px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; margin-top: 16px; }
  .login-box input { width: 100%; background: #0f172a; color: #e2e8f0; border: 1px solid #475569; border-radius: 8px; padding: 12px 14px; font-size: 16px; -webkit-appearance: none; appearance: none; }
  .login-box input:focus { outline: none; border-color: #3b82f6; }
  .login-btn { width: 100%; margin-top: 24px; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
  .login-btn:hover { background: #2563eb; }
  .login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
  .login-error { color: #f87171; font-size: 13px; margin-top: 12px; text-align: center; min-height: 20px; }
  .logout-btn { background: #334155; color: #94a3b8; border: 1px solid #475569; border-radius: 6px; padding: 4px 12px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { color: #e2e8f0; border-color: #60a5fa; }
  .user-info { font-size: 12px; color: #94a3b8; display: flex; align-items: center; gap: 8px; }
  .depot-badge { padding: 3px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
  .depot-north { background: #1e3a5f; color: #60a5fa; }
  .depot-south { background: #3b1f5e; color: #c084fc; }
  .depot-admin { background: #064e3b; color: #6ee7b7; }

  /* ── Depot Toggle ── */
  .depot-toggle { display: inline-flex; border-radius: 8px; overflow: hidden; border: 1px solid #475569; }
  .depot-toggle button { background: #1e293b; color: #94a3b8; border: none; padding: 5px 14px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; white-space: nowrap; border-right: 1px solid #475569; }
  .depot-toggle button:last-child { border-right: none; }
  .depot-toggle button:hover { color: #e2e8f0; background: #334155; }
  .depot-toggle button.dt-active-north { background: #1e3a5f; color: #60a5fa; }
  .depot-toggle button.dt-active-south { background: #3b1f5e; color: #c084fc; }
  .depot-toggle button.dt-active-both { background: #064e3b; color: #6ee7b7; }

  /* ── Export bar ── */
  .export-bar { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 6px 16px; background: #0f172a; border-bottom: 1px solid #1e293b; }
  .export-bar .export-btn { display: inline-flex; align-items: center; gap: 5px; background: #1e293b; color: #94a3b8; border: 1px solid #334155; border-radius: 6px; padding: 5px 12px; font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .export-bar .export-btn:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
  .export-bar .export-btn svg { width: 14px; height: 14px; }
  .export-menu { position: relative; display: inline-block; }
  .export-menu-dropdown { display: none; position: absolute; right: 0; top: 100%; margin-top: 4px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; min-width: 220px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); padding: 4px 0; }
  .export-menu-dropdown.open { display: block; }
  .export-menu-dropdown button { display: block; width: 100%; text-align: left; background: none; border: none; color: #cbd5e1; padding: 8px 14px; font-size: 12px; cursor: pointer; transition: background 0.1s; }
  .export-menu-dropdown button:hover { background: #334155; color: #f8fafc; }
  .export-menu-dropdown .em-divider { height: 1px; background: #334155; margin: 4px 0; }
  .export-menu-dropdown .em-label { padding: 6px 14px 2px; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; }
  /* Component-level export icon */
  .comp-export { display: inline-flex; align-items: center; justify-content: center; background: none; border: 1px solid #334155; border-radius: 4px; width: 24px; height: 24px; cursor: pointer; color: #64748b; transition: all 0.15s; margin-left: 6px; vertical-align: middle; }
  .comp-export:hover { background: #334155; color: #e2e8f0; border-color: #475569; }
  .comp-export svg { width: 12px; height: 12px; }

  #app-shell { display: none; }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="login-screen" class="login-screen">
  <div class="login-box">
    <h2><span>Cal Delivery</span> — FlowLog TMS</h2>
    <div class="login-sub">Sign in to access the dashboard</div>
    <form id="login-form" action="javascript:void(0)" onsubmit="doLogin();return false;" autocomplete="on">
      <label for="login-email">Email</label>
      <input type="email" id="login-email" name="email" placeholder="you@cal.delivery" autocomplete="email" inputmode="email" enterkeyhint="next">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" name="password" placeholder="Enter your password" autocomplete="current-password" enterkeyhint="go">
      <button type="submit" class="login-btn" id="login-btn">Sign In</button>
    </form>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- App Shell (hidden until authenticated) -->
<div id="app-shell">
<div class="header">
  <div>
    <h1><span>Cal Delivery</span> — FlowLog TMS</h1>
    <div class="sub" id="hdr-sub">Weekly Performance Dashboard</div>
  </div>
  <div class="hdr-right">
    <div class="depot-toggle" id="depot-toggle">
      <button data-depot="north" onclick="setDepotFilter('north')">North</button>
      <button data-depot="south" onclick="setDepotFilter('south')">South</button>
      <button data-depot="both" class="dt-active-both" onclick="setDepotFilter('both')">Both</button>
    </div>
    <span class="hdr-info" id="hdr-info"></span>
    <span class="user-info">
      <span id="user-email"></span>
      <button class="logout-btn" onclick="doLogout()">Sign Out</button>
    </span>
  </div>
</div>

<div class="nav">
  <div class="nav-row">
    <button class="mobile-menu-btn" onclick="toggleMobileNav()" aria-label="Menu">&#9776;</button>
    <div class="nav-tabs" id="nav">
      <button class="active" data-page="overview">Overview</button>
      <button data-page="customers">Customers</button>
      <button data-page="sales">Sales</button>
      <button data-page="regions">Regions</button>
      <button data-page="vehicles">Vehicles</button>
      <button data-page="monthly">Monthly</button>
      <button data-page="teams">Teams</button>
      <button data-page="suppliers">Suppliers</button>
      <button data-page="alerts">Alerts</button>
      <button data-page="insights">Insights</button>
      <button data-page="quotes">Quotes</button>
      <button data-page="settings" style="margin-left:auto;color:#64748b;font-size:12px">&#9881; Settings</button>
      <button data-page="admin" id="adminTab" style="color:#64748b;font-size:12px;display:none">&#128274; Admin</button>
    </div>
  </div>
  <div class="filters">
    <span class="filter-label">Range:</span>
    <button class="preset-btn" data-range="4">4W</button>
    <button class="preset-btn active" data-range="12">12W</button>
    <button class="preset-btn" data-range="26">26W</button>
    <button class="preset-btn" data-range="all">All</button>
    <span class="filter-label" style="margin-left:8px">From:</span>
    <select id="fromWeek"></select>
    <span class="filter-label">To:</span>
    <select id="toWeek"></select>
  </div>
</div>

<div class="export-bar" id="exportBar">
  <div class="export-menu" id="exportMenu">
    <button class="export-btn" onclick="toggleExportMenu()" title="Export current view as shareable HTML">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <div class="export-menu-dropdown" id="exportDropdown">
      <div class="em-label">Full Tab</div>
      <button onclick="exportTab()">Export entire tab as HTML</button>
      <div class="em-divider"></div>
      <div class="em-label">Individual Components</div>
      <div id="exportComponentList"></div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading"><span class="spin"></span> Loading dashboard data...</div>
</div>
<div class="cfg-toast" id="toast"></div>
</div><!-- /app-shell -->

<script>
// ── Mobile Nav Toggle ──
function toggleMobileNav() {
  const nav = document.getElementById('nav');
  nav.classList.toggle('mobile-open');
}
// Close mobile nav when a tab is clicked
document.addEventListener('click', function(e) {
  if (e.target.matches('.nav-tabs button[data-page]')) {
    document.getElementById('nav').classList.remove('mobile-open');
  }
});

// Refresh the session token if it's expired or about to expire
async function ensureFreshToken() {
  if (!currentSession) return;
  // Check if token expires within the next 60 seconds
  const expiresAt = currentSession.expires_at; // unix timestamp in seconds
  const now = Math.floor(Date.now() / 1000);
  if (expiresAt && (expiresAt - now) < 60) {
    console.log('Token expiring soon, refreshing...');
    const { data, error } = await sbAuth.auth.refreshSession();
    if (data?.session) {
      currentSession = data.session;
      console.log('Session refreshed, new expiry:', new Date(currentSession.expires_at * 1000).toLocaleTimeString());
    } else if (error) {
      console.error('Token refresh failed:', error.message);
      toast('Session expired. Please sign in again.', true);
      doLogout();
    }
  }
}

async function sbFetch(path) {
  await ensureFreshToken();
  const r = await fetch(SB_URL + '/rest/v1/' + path, {
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken() }
  });
  if (!r.ok) throw new Error('API ' + r.status);
  return r.json();
}

async function sbFetchAll(path) {
  // Paginate through all rows (Supabase max 1000 per request)
  const all = [];
  let offset = 0;
  const pageSize = 1000;
  while (true) {
    const sep = path.includes('?') ? '&' : '?';
    const page = await sbFetch(path + sep + 'order=id&limit=' + pageSize + '&offset=' + offset);
    all.push(...page);
    if (page.length < pageSize) break;
    offset += pageSize;
  }
  return all;
}

async function sbWrite(method, path, body) {
  await ensureFreshToken();
  const opts = {
    method,
    headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken(), 'Content-Type': 'application/json', 'Prefer': 'return=representation' }
  };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(SB_URL + '/rest/v1/' + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(method + ' ' + r.status + ': ' + t); }
  if (r.status === 204) return null;
  return r.json();
}

// ── Auth Functions ──
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errEl = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');

  if (!email || !password) { errEl.textContent = 'Please enter email and password'; return; }

  btn.disabled = true;
  btn.textContent = 'Signing in...';
  errEl.textContent = '';

  try {
    errEl.textContent = 'Connecting...';
    const { data, error } = await sbAuth.auth.signInWithPassword({ email, password });
    if (error) throw error;
    if (!data || !data.session) throw new Error('No session returned — please try again');
    currentSession = data.session;
    errEl.textContent = 'Loading profile...';
    await loadProfile();
    errEl.textContent = '';
    showApp();
  } catch (e) {
    console.error('Login error:', e);
    errEl.textContent = e.message || 'Sign-in failed — check your connection';
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function doLogout() {
  await sbAuth.auth.signOut();
  currentSession = null;
  currentProfile = null;
  document.getElementById('app-shell').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('login-error').textContent = '';
}

async function loadProfile() {
  try {
    const profiles = await sbFetch('user_profiles?user_id=eq.' + currentSession.user.id + '&select=depot,role,display_name&limit=1');
    if (profiles.length > 0) {
      currentProfile = profiles[0];
    } else {
      // No profile yet — treat as north/user by default
      currentProfile = { depot: 'north', role: 'user', display_name: currentSession.user.email };
    }
  } catch (e) {
    console.warn('Could not load user profile, using defaults:', e);
    currentProfile = { depot: 'north', role: 'user', display_name: currentSession.user.email };
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-shell').style.display = 'block';

  // Update header with user info — initialize depot toggle
  // Admins see all three options (North / South / Both)

  const isMultiDepot = currentProfile.role === 'admin' || userDepot === 'all' || userDepot === 'admin';

async function sbUpsert(table, conflictCol, body) {
  await ensureFreshToken();
  const r = await fetch(SB_URL + '/rest/v1/' + table + '?on_conflict=' + conflictCol, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken(),
      'Content-Type': 'application/json',
      'Prefer': 'resolution=merge-duplicates,return=representation'
    },
    body: JSON.stringify(body)
  });
  if (!r.ok) { const t = await r.text(); throw new Error('UPSERT ' + r.status + ': ' + t); }
  if (r.status === 204) return null;
  return r.json();
}

// ── Formatters ──
const fGBP = v => v == null ? '\u2014' : '\u00A3' + Number(v).toLocaleString('en-GB', {minimumFractionDigits:0, maximumFractionDigits:0});
const fGBP2 = v => v == null ? '\u2014' : '\u00A3' + Number(v).toLocaleString('en-GB', {minimumFractionDigits:2, maximumFractionDigits:2});
const fNum = v => v == null ? '\u2014' : Number(v).toLocaleString('en-GB');
const fPct = v => v == null ? '\u2014' : Number(v).toFixed(1) + '%';
const fWk = w => {
  if (!w) return w;
  const m = w.match(/^(\d{4})-W(\d{1,2})$/);
  if (!m) return w;
  const year = parseInt(m[1]);
  const wk = parseInt(m[2]);
  const jan4 = new Date(year, 0, 4);
  const dow = jan4.getDay() || 7;
  const mon = new Date(jan4.getTime() + ((1 - dow) + (wk - 1) * 7) * 86400000);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return 'w/c ' + mon.getDate() + ' ' + months[mon.getMonth()] + ' \u2019' + String(mon.getFullYear()).slice(2);
};
const mPill = m => { const v = Number(m); return v >= 33 ? 'pill pg' : v >= 28 ? 'pill pa' : 'pill pr'; };

function pctChange(cur, prev) {
  if (!prev || prev == 0) return '';
  const ch = ((cur - prev) / Math.abs(prev) * 100);
  const cls = ch >= 0 ? 'up' : 'down';
  const arrow = ch >= 0 ? '\u25B2' : '\u25BC';
  return '<span class="change ' + cls + '">' + arrow + ' ' + Math.abs(ch).toFixed(1) + '% vs prev week</span>';
}

// ── Filtering ──
function getFilteredWeekLabels() {
  const allWeeks = ALL_DATA.weeks || [];
  const from = filterFrom || allWeeks[0]?.week_label;
  const to = filterTo || allWeeks[allWeeks.length - 1]?.week_label;
  return allWeeks.filter(w => w.week_label >= from && w.week_label <= to).map(w => w.week_label);
}

function applyFilter() {
  const validWeeks = new Set(getFilteredWeekLabels());
  const allW = ALL_DATA.weeks || [];
  const depotActive = selectedDepot !== 'both';
  const depotMatch = (d) => !depotActive || d === selectedDepot;

  // Build filtered jobs EARLY — needed by regions, vehicles, sales, and insights sections below
  const jobsFiltered = (ALL_DATA.rawJobs || []).filter(j => validWeeks.has(j.week_label) && depotMatch(j.depot));
  console.log('🔍 applyFilter: depot=' + selectedDepot + ', weeks=' + validWeeks.size + ', jobsFiltered=' + jobsFiltered.length + ' (from ' + (ALL_DATA.rawJobs || []).length + ' total)');

  // Always rebuild week aggregates from rawJobs (ensures both/north/south are accurate)
  if ((ALL_DATA.rawJobs || []).length > 0) {
    const weekAgg = {};
    jobsFiltered.forEach(j => {
      const wk = j.week_label;
      if (!weekAgg[wk]) weekAgg[wk] = { week_label: wk, week_start: '', job_count: 0, total_revenue: 0, total_cost: 0, total_profit: 0, margin_pct: 0 };
      weekAgg[wk].job_count++;
      weekAgg[wk].total_revenue += Number(j.revenue || 0);
      weekAgg[wk].total_cost += Number(j.cost || 0);
      weekAgg[wk].total_profit += Number(j.profit || 0);
    });
    // Fill in week_start from ALL_DATA.weeks
    const wsLookup = {};
    allW.forEach(w => { wsLookup[w.week_label] = w.week_start; });
    Object.values(weekAgg).forEach(w => {
      w.week_start = wsLookup[w.week_label] || '';
      w.margin_pct = w.total_revenue > 0 ? (w.total_profit / w.total_revenue * 100).toFixed(1) : '0.0';
    });
    DATA.weeks = Object.values(weekAgg).sort((a, b) => a.week_label.localeCompare(b.week_label));
  } else {
    DATA.weeks = allW.filter(w => validWeeks.has(w.week_label));
  }

  // Build alias map for canonical name resolution
  const aliasMap = {};
  (ALL_DATA.customerAliases || []).forEach(a => {
    aliasMap[a.alias_name] = a.canonical_name;
  });

  // Filter and re-aggregate customers with alias resolution (+ depot filter)
  const cbFiltered = (ALL_DATA.rawCustomers || []).filter(c => validWeeks.has(c.week_label) && depotMatch(c.depot));
  const custMap = {};
  cbFiltered.forEach(c => {
    const resolvedName = aliasMap[c.customer_name] || c.customer_name;
    if (!custMap[resolvedName]) custMap[resolvedName] = { customer_name: resolvedName, total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0, weeks: new Set() };
    const m = custMap[resolvedName];
    m.total_jobs += Number(c.jobs);
    m.total_revenue += Number(c.revenue);
    m.total_cost += Number(c.cost);
    m.total_profit += Number(c.profit);
    m.weeks.add(c.week_label);
  });
  DATA.customers = Object.values(custMap).map(c => ({
    ...c, weeks_active: c.weeks.size,
    margin_pct: c.total_revenue > 0 ? (c.total_profit / c.total_revenue * 100).toFixed(1) : '0.0'
  })).sort((a, b) => b.total_revenue - a.total_revenue);

  // Assign customers to teams
  const teamMap = {};
  const teamManualMap = {};
  (ALL_DATA.teams || []).forEach(t => {
    teamMap[t.id] = { id: t.id, name: t.name, depot: t.depot, capacity_jobs_per_week: t.capacity_jobs_per_week, customers: new Set(), total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
  });
  (ALL_DATA.teamManualCustomers || []).forEach(tm => {
    if (!teamManualMap[tm.team_id]) teamManualMap[tm.team_id] = new Set();
    teamManualMap[tm.team_id].add(tm.customer_name);
  });

  const repAliasMap = {};
  (ALL_DATA.repAliases || []).forEach(a => {
    repAliasMap[a.alias_name] = a.canonical_name;
  });

  // Build set of customers assigned to any team (for CS catch-all)
  const assignedCustomers = new Set();

  cbFiltered.forEach(c => {
    const resolvedName = aliasMap[c.customer_name] || c.customer_name;
    let assignedTeam = null;

    // Check team_rules
    for (const rule of (ALL_DATA.teamRules || [])) {
      const team = teamMap[rule.team_id];
      if (!team) continue;

      const value = rule.value || '';
      let matches = false;
      if (rule.operator === 'contains') {
        matches = c.customer_name.includes(value);
      } else if (rule.operator === 'ends_with') {
        matches = c.customer_name.endsWith(value);
      }

      if (matches) {
        assignedTeam = rule.team_id;
        break;
      }
    }

    // Check manual assignments
    if (!assignedTeam) {
      for (const teamId of Object.keys(teamMap)) {
        if (teamManualMap[teamId] && teamManualMap[teamId].has(c.customer_name)) {
          assignedTeam = teamId;
          break;
        }
      }
    }

    if (assignedTeam && teamMap[assignedTeam]) {
      const team = teamMap[assignedTeam];
      team.customers.add(resolvedName);
      team.total_jobs += Number(c.jobs);
      team.total_revenue += Number(c.revenue);
      team.total_cost += Number(c.cost);
      team.total_profit += Number(c.profit);
      assignedCustomers.add(c.customer_name);
    }
  });

  // Auto-assign unassigned accounts to Customer Service teams per depot
  const csNorth = { id: '_cs_north', name: 'Customer Service North', depot: 'north', capacity_jobs_per_week: null, customers: new Set(), total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
  const csSouth = { id: '_cs_south', name: 'Customer Service South', depot: 'south', capacity_jobs_per_week: null, customers: new Set(), total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };

  cbFiltered.forEach(c => {
    if (assignedCustomers.has(c.customer_name)) return; // already assigned to a team
    const resolvedName = aliasMap[c.customer_name] || c.customer_name;
    const depot = (c.depot || '').toLowerCase();
    const csTeam = depot === 'south' ? csSouth : csNorth; // default to north if unknown
    csTeam.customers.add(resolvedName);
    csTeam.total_jobs += Number(c.jobs);
    csTeam.total_revenue += Number(c.revenue);
    csTeam.total_cost += Number(c.cost);
    csTeam.total_profit += Number(c.profit);
  });

  // Add CS teams to teamMap (only if they have customers)
  if (csNorth.customers.size > 0) teamMap['_cs_north'] = csNorth;
  if (csSouth.customers.size > 0) teamMap['_cs_south'] = csSouth;

  DATA.teams = Object.values(teamMap).map(t => ({
    ...t,
    customers: Array.from(t.customers),
    margin_pct: t.total_revenue > 0 ? (t.total_profit / t.total_revenue * 100).toFixed(1) : '0.0'
  })).sort((a, b) => b.total_revenue - a.total_revenue);

  // Always rebuild regions from rawJobs (ensures both/north/south are accurate; region_breakdowns lack depot column)
  const prefixMap = {};
  const regionNameMap = {};
  if (jobsFiltered.length > 0) {
    jobsFiltered.forEach(j => {
      const colPC = (j.collection_postcode || '').replace(/\s+/g, '').toUpperCase();
      const delPC = (j.delivery_postcode || '').replace(/\s+/g, '').toUpperCase();
      const colPrefix = colPC.replace(/[0-9].*/,'') || 'Unknown';
      const delPrefix = delPC.replace(/[0-9].*/,'') || 'Unknown';
      const rev = Number(j.revenue || 0);
      const profit = Number(j.profit || 0);
      const pKey = colPrefix + '|' + delPrefix;
      if (!prefixMap[pKey]) prefixMap[pKey] = { from: colPrefix, to: delPrefix, total_jobs: 0, total_revenue: 0, total_profit: 0 };
      prefixMap[pKey].total_jobs++;
      prefixMap[pKey].total_revenue += rev;
      prefixMap[pKey].total_profit += profit;
      const colName = getRegionName(colPrefix) || 'Unknown';
      const delName = getRegionName(delPrefix) || 'Unknown';
      const rKey = colName + '|' + delName;
      if (!regionNameMap[rKey]) regionNameMap[rKey] = { from: colName, to: delName, total_jobs: 0, total_revenue: 0, total_profit: 0 };
      regionNameMap[rKey].total_jobs++;
      regionNameMap[rKey].total_revenue += rev;
      regionNameMap[rKey].total_profit += profit;
    });
  } else {
    // Fallback to pre-aggregated region_breakdowns only if no rawJobs loaded
    const rbFiltered = (ALL_DATA.rawRegions || []).filter(r => validWeeks.has(r.week_label));
    rbFiltered.forEach(r => {
      const pKey = (r.col_region || '') + '|' + (r.del_region || '');
      if (!prefixMap[pKey]) prefixMap[pKey] = { from: r.col_region || 'Unknown', to: r.del_region || 'Unknown', total_jobs: 0, total_revenue: 0, total_profit: 0 };
      prefixMap[pKey].total_jobs += Number(r.jobs);
      prefixMap[pKey].total_revenue += Number(r.revenue);
      prefixMap[pKey].total_profit += Number(r.profit);
      const colName = getRegionName(r.col_region || '') || 'Unknown';
      const delName = getRegionName(r.del_region || '') || 'Unknown';
      const rKey = colName + '|' + delName;
      if (!regionNameMap[rKey]) regionNameMap[rKey] = { from: colName, to: delName, total_jobs: 0, total_revenue: 0, total_profit: 0 };
      regionNameMap[rKey].total_jobs += Number(r.jobs);
      regionNameMap[rKey].total_revenue += Number(r.revenue);
      regionNameMap[rKey].total_profit += Number(r.profit);
    });
  }
  const addMargin = r => ({ ...r, margin_pct: r.total_revenue > 0 ? (r.total_profit / r.total_revenue * 100).toFixed(1) : '0.0' });
  DATA.regionsByPrefix = Object.values(prefixMap).map(addMargin).sort((a, b) => b.total_revenue - a.total_revenue);
  DATA.regionsByName = Object.values(regionNameMap).map(addMargin).sort((a, b) => b.total_revenue - a.total_revenue);
  DATA.regions = DATA.regionsByPrefix; // default for backward compat

  // Filter and re-aggregate vehicles
  // Always rebuild vehicles from rawJobs (ensures both/north/south are accurate; vehicle_breakdowns lack depot column)
  const vehMap = {};
  if (jobsFiltered.length > 0) {
    jobsFiltered.forEach(j => {
      const vt = j.vehicle || 'Unknown';
      if (!vehMap[vt]) vehMap[vt] = { vehicle_type: vt, total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
      vehMap[vt].total_jobs++;
      vehMap[vt].total_revenue += Number(j.revenue || 0);
      vehMap[vt].total_cost += Number(j.cost || 0);
      vehMap[vt].total_profit += Number(j.profit || 0);
    });
  } else {
    // Fallback to pre-aggregated vehicle_breakdowns only if no rawJobs loaded
    const vbFiltered = (ALL_DATA.rawVehicles || []).filter(v => validWeeks.has(v.week_label));
    vbFiltered.forEach(v => {
      if (!vehMap[v.vehicle_type]) vehMap[v.vehicle_type] = { vehicle_type: v.vehicle_type, total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
      const m = vehMap[v.vehicle_type];
      m.total_jobs += Number(v.jobs);
      m.total_revenue += Number(v.revenue);
      m.total_cost += Number(v.cost);
      m.total_profit += Number(v.profit);
    });
  }
  DATA.vehicles = Object.values(vehMap).map(v => ({
    ...v,
    margin_pct: v.total_revenue > 0 ? (v.total_profit / v.total_revenue * 100).toFixed(1) : '0.0',
    avg_revenue_per_job: v.total_jobs > 0 ? (v.total_revenue / v.total_jobs).toFixed(2) : '0.00'
  })).sort((a, b) => b.total_revenue - a.total_revenue);

  // Filter and re-aggregate monthly
  const monthMap = {};
  DATA.weeks.forEach(w => {
    const mo = w.week_start.substring(0, 7);
    if (!monthMap[mo]) monthMap[mo] = { month: mo, total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
    const m = monthMap[mo];
    m.total_jobs += Number(w.job_count);
    m.total_revenue += Number(w.total_revenue);
    m.total_cost += Number(w.total_cost);
    m.total_profit += Number(w.total_profit);
  });
  DATA.monthly = Object.values(monthMap).map(m => ({
    ...m, margin_pct: m.total_revenue > 0 ? (m.total_profit / m.total_revenue * 100).toFixed(1) : '0.0'
  })).sort((a, b) => a.month.localeCompare(b.month));

  // ── Sales data processing ──
  // jobsFiltered already built at top of applyFilter()
  // repAliasMap already built above (teams section)

  // Build account start dates map (from account_overrides or earliest job)
  const accountStartDates = {};
  (ALL_DATA.accountOverrides || []).forEach(ao => {
    if (ao.start_date) accountStartDates[ao.customer_name] = ao.start_date;
  });
  // Fill in missing with earliest job date (using alias-resolved names)
  (ALL_DATA.rawJobs || []).forEach(j => {
    const cname = aliasMap[j.customer_name] || j.customer_name;
    if (!accountStartDates[cname]) {
      accountStartDates[cname] = j.week_label;
    } else if (j.week_label < accountStartDates[cname]) {
      accountStartDates[cname] = j.week_label;
    }
  });

  // Build sales aggregates (with customer + rep alias resolution)
  const salesMap = {};
  jobsFiltered.forEach(j => {
    const repName = repAliasMap[j.sales_name] || j.sales_name;
    const custName = aliasMap[j.customer_name] || j.customer_name;
    if (!salesMap[repName]) {
      salesMap[repName] = { rep_name: repName, accounts: new Set(), jobs: 0, revenue: 0, cost: 0, profit: 0, jobDetails: [] };
    }
    const s = salesMap[repName];
    s.accounts.add(custName);
    s.jobs += 1;
    s.revenue += Number(j.revenue || 0);
    s.cost += Number(j.cost || 0);
    s.profit += Number(j.profit || 0);
    s.jobDetails.push({ customer_name: custName, week_label: j.week_label, revenue: Number(j.revenue || 0), cost: Number(j.cost || 0), profit: Number(j.profit || 0) });
  });

  // Helper function to get commission status for an account/rep pair
  function parseStartDate(sd) {
    if (!sd) return null;
    // Handle week_label format like '2025-W09'
    const wkMatch = sd.match(/^(\d{4})-W(\d{2})$/);
    if (wkMatch) {
      const yr = parseInt(wkMatch[1]);
      const wk = parseInt(wkMatch[2]);
      const jan4 = new Date(yr, 0, 4);
      const startOfW1 = new Date(jan4.getTime() - jan4.getDay() * 86400000 + 86400000);
      return new Date(startOfW1.getTime() + (wk - 1) * 7 * 86400000);
    }
    const d = new Date(sd);
    return isNaN(d.getTime()) ? null : d;
  }

  function getCommissionStatus(repName, customerName, startDate) {
    const startDt = parseStartDate(startDate);
    if (!startDt) return { inCommission: false, monthsRemaining: 0, status: 'unknown' };
    let commissionMonths = 12;
    const repSetting = (ALL_DATA.repSettings || []).find(rs => rs.rep_name === repName);
    if (repSetting) commissionMonths = repSetting.commission_months || 12;
    const aoOverride = (ALL_DATA.accountOverrides || []).find(ao => ao.customer_name === customerName);
    if (aoOverride && aoOverride.commission_months) commissionMonths = aoOverride.commission_months;

    const endDt = new Date(startDt.getTime() + commissionMonths * 30.44 * 24 * 60 * 60 * 1000);
    const today = new Date();
    const daysRemaining = Math.max(0, (endDt - today) / (24 * 60 * 60 * 1000));
    const monthsRemaining = Math.max(0, daysRemaining / 30.44);
    const inCommission = today < endDt;
    let status = inCommission ? 'in' : 'out';
    if (inCommission && monthsRemaining < 2) status = 'expiring';
    return { inCommission, monthsRemaining: Math.round(monthsRemaining * 10) / 10, status, commissionMonths };
  }

  // Helper function to get commission tier for an account
  function getCommissionTier(repName, avgMargin) {
    let tiers = (ALL_DATA.repCommissionTiers || []).filter(t => t.rep_name === repName);
    if (tiers.length === 0) tiers = (ALL_DATA.commissionTiers || []);
    if (tiers.length === 0) return { commission_pct: 0, tier_info: 'no tiers' };

    const margin = Number(avgMargin);
    for (const tier of tiers) {
      const minM = Number(tier.min_margin || 0);
      const maxM = Number(tier.max_margin || 100);
      if (margin >= minM && margin < maxM) {
        return { commission_pct: Number(tier.commission_pct || 0), tier_info: minM + '-' + maxM + '%' };
      }
    }
    return { commission_pct: 0, tier_info: 'no match' };
  }

  // Build extended sales data with commission info
  const salesExtended = {};
  Object.entries(salesMap).forEach(([repName, repData]) => {
    const accountMap = {};
    repData.jobDetails.forEach(jd => {
      if (!accountMap[jd.customer_name]) {
        accountMap[jd.customer_name] = { revenue: 0, profit: 0, jobs: 0, weeks: new Set() };
      }
      accountMap[jd.customer_name].revenue += jd.revenue;
      accountMap[jd.customer_name].profit += jd.profit;
      accountMap[jd.customer_name].jobs += 1;
      accountMap[jd.customer_name].weeks.add(jd.week_label);
    });

    const accounts = Object.entries(accountMap).map(([custName, acc]) => {
      const avgMargin = acc.revenue > 0 ? (acc.profit / acc.revenue * 100) : 0;
      const startDate = accountStartDates[custName];
      const commStatus = getCommissionStatus(repName, custName, startDate);
      const tier = getCommissionTier(repName, avgMargin);
      const commission = commStatus.inCommission ? (acc.revenue * tier.commission_pct / 100) : 0;
      return {
        customer_name: custName,
        start_date: startDate,
        jobs: acc.jobs,
        revenue: acc.revenue,
        profit: acc.profit,
        commission_months: commStatus.commissionMonths || 12,
        avg_margin: avgMargin,
        commission_pct: tier.commission_pct,
        commission_value: commission,
        status: commStatus.status,
        months_remaining: commStatus.monthsRemaining,
        in_commission: commStatus.inCommission
      };
    });

    const margin_pct = repData.revenue > 0 ? (repData.profit / repData.revenue * 100) : 0;
    salesExtended[repName] = {
      rep_name: repName,
      accounts: accounts,
      num_accounts: accounts.length,
      jobs: repData.jobs,
      revenue: repData.revenue,
      profit: repData.profit,
      margin_pct: margin_pct,
      total_commission: accounts.reduce((s, a) => s + a.commission_value, 0)
    };
  });

  DATA.sales = {
    reps: Object.values(salesExtended).sort((a, b) => b.revenue - a.revenue),
    repMap: salesExtended
  };

  renderPage();
}

// ── Navigation ──
function switchPage(pg) {
  if (pg === currentPage) return;
  document.querySelectorAll('.nav-tabs button').forEach(b => b.classList.remove('active'));
  const btn = document.querySelector('.nav-tabs button[data-page="' + pg + '"]');
  if (btn) btn.classList.add('active');
  currentPage = pg;
  renderPage();
}

document.getElementById('nav').addEventListener('click', e => {
  if (e.target.tagName !== 'BUTTON') return;
  const pg = e.target.dataset.page;
  switchPage(pg);
});

// ── Filter controls ──
document.querySelectorAll('.preset-btn').forEach(btn => {
  if (btn.closest('.nav') === null) return; // only top-level nav presets
  btn.addEventListener('click', () => {
    document.querySelectorAll('.nav .preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const range = btn.dataset.range;
    const allWeeks = ALL_DATA.weeks || [];
    const dataWeeks = allWeeks.filter(w => w.job_count > 0);
    const useWeeks = dataWeeks.length > 0 ? dataWeeks : allWeeks;
    if (range === 'all') {
      filterFrom = useWeeks[0]?.week_label;
      filterTo = useWeeks[useWeeks.length - 1]?.week_label;
    } else {
      const n = parseInt(range);
      filterTo = useWeeks[useWeeks.length - 1]?.week_label;
      filterFrom = useWeeks[Math.max(0, useWeeks.length - n)]?.week_label;
    }
    document.getElementById('fromWeek').value = filterFrom;
    document.getElementById('toWeek').value = filterTo;
    loadRangeData(filterFrom, filterTo);
  });
});

document.getElementById('fromWeek').addEventListener('change', e => {
  filterFrom = e.target.value;
  document.querySelectorAll('.nav .preset-btn').forEach(b => b.classList.remove('active'));
  loadRangeData(filterFrom, filterTo);
});
document.getElementById('toWeek').addEventListener('change', e => {
  filterTo = e.target.value;
  document.querySelectorAll('.nav .preset-btn').forEach(b => b.classList.remove('active'));
  loadRangeData(filterFrom, filterTo);
});

// ── Render ──
function renderPage() {
  destroyCharts();
  const el = document.getElementById('main');
  const exportBar = document.getElementById('exportBar');
  // Settings and Admin tabs should always render, even with no data
  if (currentPage === 'settings') { if (exportBar) exportBar.style.display = 'none'; renderSettings(el); return; }
  if (currentPage === 'admin') {
    if (exportBar) exportBar.style.display = 'none';
    if (currentProfile && currentProfile.role === 'admin') { renderAdmin(el); } else {
      el.innerHTML = '<div class="loading" style="text-align:center;padding:60px 20px"><p style="font-size:18px;color:#f87171">Access denied.</p><p style="color:#94a3b8">Admin access required.</p></div>';
    }
    return;
  }
  if (exportBar) exportBar.style.display = 'flex';
  // Quotes tab works independently of consignment data
  if (currentPage === 'quotes') { renderQuoteConversion(el); return; }
  if (!DATA.weeks || !DATA.weeks.length) {
    el.innerHTML = '<div class="loading" style="text-align:center;padding:60px 20px"><p style="font-size:18px;margin-bottom:12px">No data for selected range.</p><p style="color:#94a3b8">Go to the <a href="#" onclick="switchPage(\'admin\');return false" style="color:#3b82f6">Admin</a> tab to upload consignment log files.</p></div>';
    return;
  }
  switch(currentPage) {
    case 'overview': renderOverview(el); break;
    case 'customers': renderCustomers(el); break;
    case 'sales': renderSales(el); break;
    case 'regions': renderRegions(el); break;
    case 'vehicles': renderVehicles(el); break;
    case 'monthly': renderMonthly(el); break;
    case 'teams': renderTeams(el); break;
    case 'alerts': renderAlerts(el); break;
    case 'suppliers': renderSuppliers(el); break;
    case 'insights': renderInsights(el); break;
    case 'quotes': renderQuoteConversion(el); break;
  }
  // Add export icons to component headers
  setTimeout(addComponentExportIcons, 50);
}

// ── CUSTOMERS ──
let custSortCol = 'total_revenue';
let custSortDir = 'desc';
let custHealthFilter = 'all'; // all, growing, declining, at-risk, new

function renderCustomers(el) {
  const c = DATA.customers;
  const allWeeksSorted = DATA.weeks.map(w => w.week_label).sort();
  const latestWeek = allWeeksSorted[allWeeksSorted.length - 1];
  const last12Weeks = allWeeksSorted.slice(-12);
  const last12Set = new Set(last12Weeks);

  // Build alias map
  const aliasMap = {};
  (ALL_DATA.customerAliases || []).forEach(a => { aliasMap[a.alias_name] = a.canonical_name; });

  // Build per-customer weekly revenue map from rawCustomers
  const custWeekly = {};
  (ALL_DATA.rawCustomers || []).forEach(r => {
    const name = aliasMap[r.customer_name] || r.customer_name;
    if (!custWeekly[name]) custWeekly[name] = {};
    if (!custWeekly[name][r.week_label]) custWeekly[name][r.week_label] = { rev: 0, profit: 0, jobs: 0 };
    custWeekly[name][r.week_label].rev += Number(r.revenue || 0);
    custWeekly[name][r.week_label].profit += Number(r.profit || 0);
    custWeekly[name][r.week_label].jobs += Number(r.jobs || 0);
  });

  // Enrich each customer with trend data
  const numLast12 = last12Weeks.length || 1;

  // Company-wide weekly average revenue (over last 12 weeks) for materiality threshold
  const companyTotal12w = DATA.weeks.filter(w => last12Set.has(w.week_label)).reduce((s, w) => s + Number(w.total_revenue || 0), 0);
  const companyAvgWeekly = companyTotal12w / numLast12 || 1;
  // Materiality: customer must average at least 0.5% of company weekly revenue to be flagged as declining/at-risk
  const materialityThreshold = companyAvgWeekly * 0.005;
  const enriched = c.map(cust => {
    const weekly = custWeekly[cust.customer_name] || {};
    // 12-week totals and averages (divide by 12 for true weekly average)
    const last12Revs = last12Weeks.map(wk => (weekly[wk] || {}).rev || 0);
    const last12Jobs = last12Weeks.map(wk => (weekly[wk] || {}).jobs || 0);
    const total12wRev = last12Revs.reduce((a, b) => a + b, 0);
    const total12wJobs = last12Jobs.reduce((a, b) => a + b, 0);
    const avg12wRev = total12wRev / numLast12;
    const avg12wJobs = total12wJobs / numLast12;
    const weeksIn12 = last12Revs.filter(v => v > 0).length;
    // Latest week
    const latestRev = (weekly[latestWeek] || {}).rev || 0;
    const latestJobs = (weekly[latestWeek] || {}).jobs || 0;
    // Previous week
    const prevWeek = allWeeksSorted.length >= 2 ? allWeeksSorted[allWeeksSorted.length - 2] : null;
    const prevRev = prevWeek ? ((weekly[prevWeek] || {}).rev || 0) : 0;
    const prevJobs = prevWeek ? ((weekly[prevWeek] || {}).jobs || 0) : 0;
    // Job volume change vs 12w avg (primary health metric)
    const vsAvgJobs = avg12wJobs > 0 ? ((latestJobs - avg12wJobs) / avg12wJobs * 100) : (latestJobs > 0 ? 100 : 0);
    const jobImpact = latestJobs - avg12wJobs;
    // Revenue change vs 12w avg (secondary)
    const vsAvgRev = avg12wRev > 0 ? ((latestRev - avg12wRev) / avg12wRev * 100) : (latestRev > 0 ? 100 : 0);
    const revImpact = latestRev - avg12wRev;
    // Wow change (jobs)
    const wowJobs = prevJobs > 0 ? ((latestJobs - prevJobs) / prevJobs * 100) : (latestJobs > 0 ? 100 : 0);
    const wowRev = prevRev > 0 ? ((latestRev - prevRev) / prevRev * 100) : (latestRev > 0 ? 100 : 0);
    // Weeks since last active
    let lastActiveIdx = -1;
    for (let i = allWeeksSorted.length - 1; i >= 0; i--) {
      if (weekly[allWeeksSorted[i]] && weekly[allWeeksSorted[i]].rev > 0) { lastActiveIdx = i; break; }
    }
    const weeksSinceLast = lastActiveIdx >= 0 ? (allWeeksSorted.length - 1 - lastActiveIdx) : 999;
    // First seen: earliest week with any activity
    let firstSeenIdx = allWeeksSorted.length;
    for (let i = 0; i < allWeeksSorted.length; i++) {
      if (weekly[allWeeksSorted[i]] && weekly[allWeeksSorted[i]].rev > 0) { firstSeenIdx = i; break; }
    }
    const weeksOnBook = allWeeksSorted.length - firstSeenIdx;
    // Health status — driven by job volume, with materiality filter
    // Only flag declining/at-risk if customer's 12W avg revenue meets materiality threshold
    const isMaterial = avg12wRev >= materialityThreshold;
    let health = 'stable';
    if (weeksOnBook <= 4) health = 'new';
    else if (weeksSinceLast >= 4 && isMaterial) health = 'at-risk';
    else if (vsAvgJobs < -25 && avg12wJobs > 0 && isMaterial) health = 'declining';
    else if (vsAvgJobs > 25 && avg12wJobs > 0) health = 'growing';

    return { ...cust, avg12wRev, avg12wJobs, total12wRev, total12wJobs, latestRev, latestJobs, prevRev, prevJobs, wowJobs, wowRev, vsAvgJobs, vsAvgRev, jobImpact, revImpact, health, weeksSinceLast, weeksIn12, weeksOnBook };
  });

  // Filter by health
  let filtered = enriched;
  if (custHealthFilter !== 'all') filtered = enriched.filter(x => x.health === custHealthFilter);

  // Default sort depends on health filter for maximum business impact
  if (custSortCol === 'total_revenue' && custSortDir === 'desc') {
    // Apply smart defaults per filter
    if (custHealthFilter === 'growing') {
      filtered.sort((a, b) => b.jobImpact - a.jobImpact); // biggest job volume growth at top
    } else if (custHealthFilter === 'declining') {
      filtered.sort((a, b) => a.jobImpact - b.jobImpact); // biggest job volume drop at top
    } else if (custHealthFilter === 'at-risk') {
      filtered.sort((a, b) => b.avg12wJobs - a.avg12wJobs); // biggest lost job volume at top
    } else if (custHealthFilter === 'new') {
      filtered.sort((a, b) => b.total_revenue - a.total_revenue); // biggest new spenders first
    } else {
      filtered.sort((a, b) => b.total_revenue - a.total_revenue);
    }
  } else {
    // Manual sort by clicked column
    filtered.sort((a, b) => {
      let va = a[custSortCol], vb = b[custSortCol];
      if (typeof va === 'string') { va = va.toLowerCase(); vb = (vb||'').toLowerCase(); }
      return custSortDir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });
  }

  // Health counts
  const hCounts = { all: enriched.length, growing: 0, declining: 0, 'at-risk': 0, 'new': 0, stable: 0 };
  enriched.forEach(x => hCounts[x.health] = (hCounts[x.health] || 0) + 1);

  const healthBadge = h => {
    const map = { growing: ['#065f46','#6ee7b7','\u25B2 Growing'], declining: ['#7f1d1d','#fca5a5','\u25BC Declining'], 'at-risk': ['#78350f','#fcd34d','\u26A0 At Risk'], 'new': ['#1e3a5f','#93c5fd','\u2605 New'], stable: ['#334155','#94a3b8','\u2014 Stable'] };
    const [bg, fg, label] = map[h] || map.stable;
    return `<span style="background:${bg};color:${fg};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600">${label}</span>`;
  };

  const trendArrow = (val) => {
    if (val > 10) return `<span style="color:#6ee7b7">\u25B2 ${val.toFixed(1)}%</span>`;
    if (val < -10) return `<span style="color:#fca5a5">\u25BC ${Math.abs(val).toFixed(1)}%</span>`;
    return `<span style="color:#94a3b8">\u25AC ${Math.abs(val).toFixed(1)}%</span>`;
  };

  const sortIcon = col => custSortCol === col ? (custSortDir === 'asc' ? ' \u25B2' : ' \u25BC') : '';
  const sortClick = col => `onclick="custSortCol='${col}'; custSortDir=(custSortCol==='${col}' && custSortDir==='desc')?'asc':'desc'; renderPage()"`;

  const top10 = enriched.slice(0, 10);
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#4ade80','#06b6d4','#f97316','#a78bfa','#fb923c','#34d399'];

  el.innerHTML = `
    <div class="range-info">Showing ${filtered.length} of ${enriched.length} customers for selected period | 12-week baseline: ${fWk(last12Weeks[0])} to ${fWk(last12Weeks[last12Weeks.length-1])} | Materiality threshold: ${fGBP(Math.round(materialityThreshold))}/wk (0.5% of ${fGBP(Math.round(companyAvgWeekly))}/wk company avg)</div>

    <div class="kpi-row" style="margin-bottom:16px">
      <div class="kpi" style="cursor:pointer;${custHealthFilter==='all'?'border-color:#3b82f6':''}" onclick="custHealthFilter='all';custSortCol='total_revenue';custSortDir='desc';renderPage()"><div class="label">All Customers</div><div class="value">${hCounts.all}</div></div>
      <div class="kpi" style="cursor:pointer;${custHealthFilter==='growing'?'border-color:#4ade80':''}" onclick="custHealthFilter='growing';custSortCol='total_revenue';custSortDir='desc';renderPage()"><div class="label">\u25B2 Growing</div><div class="value" style="color:#6ee7b7">${hCounts.growing}</div></div>
      <div class="kpi" style="cursor:pointer;${custHealthFilter==='declining'?'border-color:#fca5a5':''}" onclick="custHealthFilter='declining';custSortCol='total_revenue';custSortDir='desc';renderPage()"><div class="label">\u25BC Declining</div><div class="value" style="color:#fca5a5">${hCounts.declining}</div></div>
      <div class="kpi" style="cursor:pointer;${custHealthFilter==='at-risk'?'border-color:#fcd34d':''}" onclick="custHealthFilter='at-risk';custSortCol='total_revenue';custSortDir='desc';renderPage()"><div class="label">\u26A0 At Risk</div><div class="value" style="color:#fcd34d">${hCounts['at-risk']}</div></div>
      <div class="kpi" style="cursor:pointer;${custHealthFilter==='new'?'border-color:#93c5fd':''}" onclick="custHealthFilter='new';custSortCol='total_revenue';custSortDir='desc';renderPage()"><div class="label">\u2605 New</div><div class="value" style="color:#93c5fd">${hCounts['new']}</div></div>
    </div>

    <div class="grid-2">
      <div class="card"><h3>Top 10 Customers by Revenue</h3><div class="chart-wrap"><canvas id="cc1"></canvas></div></div>
      <div class="card"><h3>Revenue vs Profit (Top 10)</h3><div class="chart-wrap"><canvas id="cc2"></canvas></div></div>
    </div>

    <div class="card"><h3>Customer Health &amp; Performance</h3>
    <div style="max-height:600px;overflow:auto">
      <table><thead><tr>
        <th style="cursor:pointer" ${sortClick('customer_name')}>Customer${sortIcon('customer_name')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('health')}>Health${sortIcon('health')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('latestJobs')}>Last Wk Jobs${sortIcon('latestJobs')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('avg12wJobs')}>12W Avg Jobs${sortIcon('avg12wJobs')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('vsAvgJobs')}>vs 12W Avg${sortIcon('vsAvgJobs')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('latestRev')}>Last Wk Rev${sortIcon('latestRev')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('avg12wRev')}>12W Avg Rev${sortIcon('avg12wRev')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('vsAvgRev')}>vs 12W Avg${sortIcon('vsAvgRev')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('margin_pct')}>Margin${sortIcon('margin_pct')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('total_revenue')}>All-Time Rev${sortIcon('total_revenue')}</th>
        <th class="r" style="cursor:pointer" ${sortClick('weeksIn12')}>Frequency${sortIcon('weeksIn12')}</th>
      </tr></thead>
      <tbody>${filtered.map(x => `<tr>
        <td>${x.customer_name}</td>
        <td class="r">${healthBadge(x.health)}</td>
        <td class="r">${fNum(x.latestJobs)}</td>
        <td class="r">${x.avg12wJobs > 0 ? x.avg12wJobs.toFixed(1) : '\u2014'}</td>
        <td class="r">${x.avg12wJobs > 0 ? trendArrow(x.vsAvgJobs) : '\u2014'}</td>
        <td class="r">${fGBP(x.latestRev)}</td>
        <td class="r">${fGBP(Math.round(x.avg12wRev))}</td>
        <td class="r">${x.avg12wRev > 0 ? trendArrow(x.vsAvgRev) : '\u2014'}</td>
        <td class="r"><span class="${mPill(x.margin_pct)}">${fPct(x.margin_pct)}</span></td>
        <td class="r">${fGBP(x.total_revenue)}</td>
        <td class="r">${x.weeksIn12}/${numLast12}wk</td>
      </tr>`).join('')}</tbody></table>
    </div></div>`;

  charts.push(new Chart(document.getElementById('cc1'), {
    type: 'doughnut',
    data: { labels: top10.map(x => x.customer_name), datasets: [{ data: top10.map(x => x.total_revenue), backgroundColor: colors }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { size: 10 } } }, tooltip: { callbacks: { label: ctx => ctx.label + ': ' + fGBP(ctx.raw) } } } }
  }));

  charts.push(new Chart(document.getElementById('cc2'), {
    type: 'bar',
    data: {
      labels: top10.map(x => x.customer_name.substring(0, 16)),

        { label: 'Profit', data: top10.map(x => x.total_profit), backgroundColor: '#4ade80', borderRadius: 3 }

      scales: { x: { ticks: { callback: v => '\u00A3' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#1e293b' } }, y: { grid: { display: false } } },
      plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fGBP(ctx.raw) } } }

  }));
}

// ── REGIONS ──
let regionViewMode = 'region'; // 'region' or 'prefix'
let regionExpandedFlow = null; // 'from|to' key of expanded flow

// Toggle flow expand — works in dashboard and in exported HTML
function toggleFlowExpand(rowEl, flowKey) {
  const detailRow = rowEl.nextElementSibling;
  if (!detailRow || !detailRow.classList.contains('flow-detail')) return;
  const isVisible = detailRow.style.display !== 'none';
  // Collapse all other expanded rows in the same table
  const tbody = rowEl.closest('tbody');
  if (tbody) {
    tbody.querySelectorAll('.flow-detail').forEach(d => { d.style.display = 'none'; });
    tbody.querySelectorAll('.flow-chevron').forEach(c => { c.style.transform = 'rotate(0deg)'; });
  }
  // Toggle this one
  if (!isVisible) {
    detailRow.style.display = '';
    const chevron = rowEl.querySelector('.flow-chevron');
    if (chevron) chevron.style.transform = 'rotate(90deg)';
    regionExpandedFlow = flowKey;
  } else {
    regionExpandedFlow = null;
  }
}

function renderRegions(el) {
  const isRegion = regionViewMode === 'region';
  const validWeeks = new Set(DATA.weeks.map(w => w.week_label));
  const depotActive = selectedDepot !== 'both';
  const depotMatch = (d) => !depotActive || d === selectedDepot;

  // Build enriched region flows from rawJobs (with per-vehicle breakdown + distance)
  const flowMap = {};
  const jobs = (ALL_DATA.rawJobs || []).filter(j => validWeeks.has(j.week_label) && depotMatch(j.depot));

  jobs.forEach(j => {
    const colPC = (j.collection_postcode || '').replace(/\s+/g, '').toUpperCase();
    const delPC = (j.delivery_postcode || '').replace(/\s+/g, '').toUpperCase();
    const colPrefix = colPC.replace(/[0-9].*/,'') || 'Unknown';
    const delPrefix = delPC.replace(/[0-9].*/,'') || 'Unknown';
    const fromKey = isRegion ? (getRegionName(colPrefix) || 'Unknown') : colPrefix;
    const toKey = isRegion ? (getRegionName(delPrefix) || 'Unknown') : delPrefix;
    const flowKey = fromKey + '|' + toKey;
    const veh = j.vehicle || 'Unknown';
    const rev = Number(j.revenue || 0);
    const cost = Number(j.cost || 0);
    const prof = Number(j.profit || 0);
    const dist = estimateDistanceKm(j.collection_postcode, j.delivery_postcode);
    const miles = dist !== null ? distToMiles(dist) : null;
    const isApp = isAppDriver(j);

    if (!flowMap[flowKey]) flowMap[flowKey] = {
      from: fromKey, to: toKey,
      total_jobs: 0, total_revenue: 0, total_cost: 0, total_profit: 0,
      distances: [], vehicles: {}, appJobs: 0, cxJobs: 0, weeks: new Set()
    };
    const fl = flowMap[flowKey];
    fl.total_jobs++;
    fl.total_revenue += rev;
    fl.total_cost += cost;
    fl.total_profit += prof;
    if (miles !== null) fl.distances.push(miles);
    if (isApp) fl.appJobs++; else fl.cxJobs++;
    fl.weeks.add(j.week_label);

    if (!fl.vehicles[veh]) fl.vehicles[veh] = { vehicle: veh, jobs: 0, revenue: 0, cost: 0, profit: 0, distances: [], appJobs: 0, cxJobs: 0, weeks: new Set() };
    const fv = fl.vehicles[veh];
    fv.jobs++;
    fv.revenue += rev;
    fv.cost += cost;
    fv.profit += prof;
    if (miles !== null) fv.distances.push(miles);
    if (isApp) fv.appJobs++; else fv.cxJobs++;
    fv.weeks.add(j.week_label);
  });

  // Calculate avg jobs/day: total jobs / (number of weeks * 5 working days)
  // Using 5-day working week as standard for haulage
  const r = Object.values(flowMap).map(fl => {
    const numWeeks = fl.weeks.size || 1;
    const workingDays = numWeeks * 5;
    return {
      ...fl,
      margin_pct: fl.total_revenue > 0 ? (fl.total_profit / fl.total_revenue * 100).toFixed(1) : '0.0',
      avg_miles: fl.distances.length > 0 ? (fl.distances.reduce((a,b) => a+b, 0) / fl.distances.length) : null,
      app_pct: fl.total_jobs > 0 ? (fl.appJobs / fl.total_jobs * 100) : 0,
      cx_pct: fl.total_jobs > 0 ? (fl.cxJobs / fl.total_jobs * 100) : 0,
      avg_jobs_per_day: fl.total_jobs / workingDays,
      numWeeks,
      vehicleList: Object.values(fl.vehicles).map(v => {
        const vWeeks = v.weeks.size || 1;
        const vWorkingDays = vWeeks * 5;
        return {
          ...v,
          margin: v.revenue > 0 ? (v.profit / v.revenue * 100) : 0,
          avg_miles: v.distances.length > 0 ? (v.distances.reduce((a,b) => a+b, 0) / v.distances.length) : null,
          app_pct: v.jobs > 0 ? (v.appJobs / v.jobs * 100) : 0,
          cx_pct: v.jobs > 0 ? (v.cxJobs / v.jobs * 100) : 0,
          avg_jobs_per_day: v.jobs / vWorkingDays,
          numWeeks: vWeeks
        };
      }).sort((a, b) => b.jobs - a.jobs)
    };
  }).sort((a, b) => b.total_revenue - a.total_revenue);

  const top12 = r.slice(0, 12);
  const modeLabel = isRegion ? 'Region' : 'Postcode Prefix';

  // Build table rows with expandable detail
  function buildFlowRow(x) {
    const flowKey = x.from + '|' + x.to;
    const isExpanded = regionExpandedFlow === flowKey;
    const escapedKey = flowKey.replace(/'/g, "\\'");
    const avgMi = x.avg_miles !== null ? x.avg_miles.toFixed(0) + ' mi' : '\u2014';
    const chevron = `<span class="flow-chevron" style="display:inline-block;transition:transform 0.2s;transform:rotate(${isExpanded ? '90' : '0'}deg);margin-right:4px;font-size:10px;color:#64748b">\u25B6</span>`;
    let html = `<tr class="flow-row" style="cursor:pointer" data-flow-key="${flowKey}" onclick="toggleFlowExpand(this, '${escapedKey}')">
      <td style="font-weight:600">${chevron}${x.from||'\u2014'}</td><td style="font-weight:600">${x.to||'\u2014'}</td>
      <td class="r">${fNum(x.total_jobs)}</td><td class="r">${x.avg_jobs_per_day.toFixed(1)}</td>
      <td class="r">${fGBP(x.total_revenue)}</td>
      <td class="r">${fGBP(x.total_profit)}</td><td class="r"><span class="${mPill(x.margin_pct)}">${fPct(x.margin_pct)}</span></td>
      <td class="r">${avgMi}</td>
      <td class="r" style="color:#f59e0b">${x.app_pct.toFixed(0)}%</td>
      <td class="r" style="color:#60a5fa">${x.cx_pct.toFixed(0)}%</td>
    </tr>`;

    // Always render the expanded detail row (hidden if not active) so exports capture it
    html += `<tr class="flow-detail" data-flow-key="${flowKey}" style="display:${isExpanded ? '' : 'none'}"><td colspan="10" style="padding:0;background:#0b1222">
        <div style="padding:12px 16px">
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">
            <div style="background:#1e293b;border-radius:6px;padding:8px 12px;flex:1;min-width:120px">
              <div style="font-size:11px;color:#64748b">Total Jobs</div>
              <div style="font-size:18px;font-weight:700;color:#f8fafc">${fNum(x.total_jobs)}</div>
            </div>
            <div style="background:#1e293b;border-radius:6px;padding:8px 12px;flex:1;min-width:120px">
              <div style="font-size:11px;color:#64748b">Avg Jobs/Day</div>
              <div style="font-size:18px;font-weight:700;color:#f8fafc">${x.avg_jobs_per_day.toFixed(1)}</div>
              <div style="font-size:10px;color:#64748b">${x.numWeeks}wk \u00d7 5 days</div>
            </div>
            <div style="background:#1e293b;border-radius:6px;padding:8px 12px;flex:1;min-width:120px">
              <div style="font-size:11px;color:#64748b">Avg Miles</div>
              <div style="font-size:18px;font-weight:700;color:#f8fafc">${x.avg_miles !== null ? x.avg_miles.toFixed(0) : '\u2014'}</div>
            </div>
            <div style="background:#1e293b;border-radius:6px;padding:8px 12px;flex:1;min-width:120px">
              <div style="font-size:11px;color:#64748b">App Drivers</div>
              <div style="font-size:18px;font-weight:700;color:#f59e0b">${x.app_pct.toFixed(0)}% <span style="font-size:12px;font-weight:400">(${x.appJobs})</span></div>
            </div>
            <div style="background:#1e293b;border-radius:6px;padding:8px 12px;flex:1;min-width:120px">
              <div style="font-size:11px;color:#64748b">CX Drivers</div>
              <div style="font-size:18px;font-weight:700;color:#60a5fa">${x.cx_pct.toFixed(0)}% <span style="font-size:12px;font-weight:400">(${x.cxJobs})</span></div>
            </div>
          </div>
          <div style="font-size:12px;font-weight:600;color:#94a3b8;margin-bottom:6px">Vehicle Breakdown \u2014 ${x.from} \u2192 ${x.to}</div>
          <table style="font-size:12px;width:100%">
            <thead><tr><th>Vehicle</th><th class="r">Jobs</th><th class="r">Avg/Day</th><th class="r">Revenue</th><th class="r">Profit</th><th class="r">Margin</th><th class="r">Avg Miles</th><th class="r">App</th><th class="r">CX</th><th class="r">Share</th></tr></thead>
            <tbody>${x.vehicleList.map(v => {
              const vMargin = v.margin;
              const sharePct = x.total_jobs > 0 ? (v.jobs / x.total_jobs * 100) : 0;
              const vAvgMi = v.avg_miles !== null ? v.avg_miles.toFixed(0) + ' mi' : '\u2014';
              const barW = Math.max(2, Math.round(sharePct));
              return `<tr style="background:#0f172a">
                <td style="font-weight:600">${v.vehicle}</td>
                <td class="r">${fNum(v.jobs)}</td>
                <td class="r" style="color:#60a5fa">${v.avg_jobs_per_day.toFixed(1)}</td>
                <td class="r">${fGBP(v.revenue)}</td>
                <td class="r">${fGBP(v.profit)}</td>
                <td class="r"><span class="${mPill(vMargin.toFixed(1))}">${vMargin.toFixed(1)}%</span></td>
                <td class="r">${vAvgMi}</td>
                <td class="r" style="color:#f59e0b">${v.app_pct.toFixed(0)}%</td>
                <td class="r" style="color:#60a5fa">${v.cx_pct.toFixed(0)}%</td>
                <td class="r"><div style="display:flex;align-items:center;gap:6px;justify-content:flex-end"><span style="font-size:11px;color:#94a3b8">${sharePct.toFixed(0)}%</span><div style="width:50px;background:#334155;border-radius:3px;height:10px;overflow:hidden"><div style="background:#3b82f6;height:100%;width:${barW}%;border-radius:3px"></div></div></div></td>
              </tr>`;
            }).join('')}</tbody>
          </table>
        </div>
      </td></tr>`;
    return html;
  }

  el.innerHTML = `
    <div class="range-info" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px">
      <span>Showing ${r.length} ${modeLabel.toLowerCase()} flows for selected period</span>
      <div style="display:flex;gap:4px">
        <button class="cfg-btn cfg-btn-sm ${isRegion ? 'cfg-btn-primary' : ''}" onclick="regionViewMode='region';regionExpandedFlow=null;renderPage()">By Region</button>
        <button class="cfg-btn cfg-btn-sm ${!isRegion ? 'cfg-btn-primary' : ''}" onclick="regionViewMode='prefix';regionExpandedFlow=null;renderPage()">By Postcode Prefix</button>
      </div>
    </div>
    <div class="card"><h3>Top ${modeLabel} Flows by Revenue</h3><div style="height:420px"><canvas id="rc1"></canvas></div></div>
    <div class="card"><h3>All ${modeLabel} Flows</h3>
      <p style="font-size:12px;color:#64748b;margin-bottom:8px">Click a row to see vehicle breakdown, average miles, and app allocation.</p>
      <div style="max-height:600px;overflow:auto">
      <table><thead><tr><th>Collection</th><th>Delivery</th><th class="r">Jobs</th><th class="r">Avg/Day</th><th class="r">Revenue</th><th class="r">Profit</th><th class="r">Margin</th><th class="r">Avg Miles</th><th class="r">App %</th><th class="r">CX %</th></tr></thead>
      <tbody>${r.map(x => buildFlowRow(x)).join('')}</tbody></table>
    </div></div>`;

  charts.push(new Chart(document.getElementById('rc1'), {
    type: 'bar',
    data: {
      labels: top12.map(x => (x.from||'?').substring(0,16) + ' \u2192 ' + (x.to||'?').substring(0,16)),
      datasets: [
        { label: 'Revenue', data: top12.map(x => x.total_revenue), backgroundColor: '#3b82f6', borderRadius: 3 },
        { label: 'Profit', data: top12.map(x => x.total_profit), backgroundColor: '#4ade80', borderRadius: 3 }
      ]
    },
    options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      scales: { x: { ticks: { callback: v => '\u00A3' + (v/1000).toFixed(0) + 'k' }, grid: { color: '#1e293b' } }, y: { grid: { display: false }, ticks: { font: { size: 10 } } } },
      plugins: { tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + fGBP(ctx.raw) } } }
    }
  }));
}

function renderVehicles(el) {
  const v = DATA.vehicles;
  const colors = ['#3b82f6','#8b5cf6','#ec4899','#f59e0b','#4ade80','#06b6d4','#f97316','#a78bfa','#fb923c','#34d399'];

  el.innerHTML = `
    <div class="range-info">Showing ${v.length} vehicle types for selected period</div>
    <div class="grid-2">
      <div class="card"><h3>Jobs by Vehicle Type</h3><div class="chart-wrap"><canvas id="vc1"></canvas></div></div>
      <div class="card"><h3>Revenue &amp; Profit by Vehicle</h3><div class="chart-wrap"><canvas id="vc2"></canvas></div></div>

  // Check if supplier data exists
  const hasSupplier = jobs.some(j => j.supplier && j.supplier.trim());
  if (!hasSupplier) {
    el.innerHTML = `
      <div class="range-info">Supplier analysis requires supplier data in the jobs table</div>

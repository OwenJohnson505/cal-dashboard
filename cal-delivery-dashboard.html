    '<div style="flex:0 0 200px">' + Object.entries(reasonTotals).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]).map(([r, v]) =>
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">' +
      '<div style="width:10px;height:10px;border-radius:2px;background:' + (reasonColors[r] || '#888') + '"></div>' +
      '<span style="font-size:12px;flex:1">' + r + '</span>' +
      '<span style="font-size:12px;color:#94a3b8">' + v + ' (' + (reasonTotal > 0 ? (v / reasonTotal * 100).toFixed(1) : 0) + '%)</span></div>'
    ).join('') + '</div></div>' +
    (reasonTotals['Non-Compliant'] > 0 ? '<p style="font-size:11px;color:#fbbf24;margin-top:8px;padding:8px 12px;background:#78350f33;border-radius:6px"><strong>Note:</strong> "Non-Compliant" = cancellations without a valid RC1\u2013RC5 code. Review these for process compliance.</p>' : '') +
    '</div>' : '') +

    // Search bar
    '<div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">' +
    '<input type="text" placeholder="Search customers or reps\u2026" value="' + (quoteSearch || '') + '" oninput="quoteSearch=this.value;renderPage()" style="flex:1;max-width:300px;padding:8px 12px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;font-size:13px">' +
    '<span style="font-size:12px;color:#64748b">' + filtered.length + ' customers</span></div>' +

    // Customer table
    '<div class="card" style="overflow-x:auto"><table><thead><tr>' +
    '<th style="cursor:pointer" ' + qSortClick('customerName') + '>Customer' + arrow('customerName') + '</th>' +
    '<th style="cursor:pointer" ' + qSortClick('salesName') + '>Rep' + arrow('salesName') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('convertedCount') + '>Conv.' + arrow('convertedCount') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('nonConvertedCount') + '>Non-Conv.' + arrow('nonConvertedCount') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('cancelledCount') + '>Cancelled' + arrow('cancelledCount') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('totalQuotes') + '>Total' + arrow('totalQuotes') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('conversionRate') + '>Conv. Rate' + arrow('conversionRate') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('convertedRevenue') + '>Conv. Rev' + arrow('convertedRevenue') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('nonConvertedRevenue') + '>Active Rev' + arrow('nonConvertedRevenue') + '</th>' +
    '<th class="r" style="cursor:pointer" ' + qSortClick('cancelledRevenue') + '>Cancelled Rev' + arrow('cancelledRevenue') + '</th>' +
    '<th>Top Reason</th>' +
    '</tr></thead><tbody>' +
    filtered.slice(0, 200).map(c =>
      '<tr><td style="font-weight:600;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + c.customerName + '</td>' +
      '<td>' + (c.salesName || '\u2014') + '</td>' +
      '<td class="r">' + c.convertedCount + '</td>' +
      '<td class="r">' + c.nonConvertedCount + '</td>' +
      '<td class="r">' + c.cancelledCount + '</td>' +
      '<td class="r" style="font-weight:600">' + c.totalQuotes + '</td>' +
      '<td class="r"><span class="' + ratePill(c.conversionRate) + '">' + c.conversionRate.toFixed(1) + '%</span></td>' +
      '<td class="r">' + fGBP(c.convertedRevenue) + '</td>' +
      '<td class="r">' + fGBP(c.nonConvertedRevenue) + '</td>' +
      '<td class="r">' + fGBP(c.cancelledRevenue) + '</td>' +
      '<td>' + reasonBadge(c.topReason) + '</td></tr>'
    ).join('') +
    (filtered.length > 200 ? '<tr><td colspan="11" style="color:#64748b;text-align:center;padding:12px">Showing top 200 of ' + filtered.length + '</td></tr>' : '') +
    '</tbody></table></div>';

  // Draw reason chart
  if (reasonTotal > 0) {
    const chartData = Object.entries(reasonTotals).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    charts.push(new Chart(document.getElementById('qReasonChart'), {
      type: 'bar',
      data: {
        labels: chartData.map(([r]) => r),
        datasets: [{ data: chartData.map(([, v]) => v), backgroundColor: chartData.map(([r]) => reasonColors[r] || '#888'), borderRadius: 3 }]
      },
      options: {
        indexAxis: 'x',
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + ' (' + (ctx.raw / reasonTotal * 100).toFixed(1) + '%)' } } },
        scales: { y: { beginAtZero: true, grid: { color: '#1e293b' }, ticks: { color: '#94a3b8' } }, x: { grid: { display: false }, ticks: { color: '#94a3b8' } } }
      }
    }));
  }
}

async function runDataDiagnostics() {
  const el = document.getElementById('diagnosticsResult');
  el.style.display = 'block';
  el.innerHTML = '<div class="card"><h3>Running Data Diagnostics...</h3><p id="diagStatus" style="font-size:13px;color:#94a3b8">Checking tables...</p></div>';

  function diagStatus(msg) { document.getElementById('diagStatus').textContent = msg; }

  try {
    diagStatus('Fetching weekly summaries...');
    const ws = await sbFetch('weekly_summaries?select=week_label,job_count,total_revenue,total_cost,total_profit&order=week_start.asc&limit=500');

    // Fetch ALL jobs with revenue data for deep analysis (paginated)
    diagStatus('Fetching all jobs for revenue analysis (this may take a moment)...');
    const allJobs = [];
    let offset = 0;
    while (true) {
      const page = await sbFetch('jobs?select=depot,week_label,revenue,cost,profit,job_no,customer_name&limit=1000&offset=' + offset + '&order=id');
      allJobs.push(...page);
      diagStatus('Loaded ' + allJobs.length.toLocaleString() + ' jobs...');
      if (page.length < 1000) break;
      offset += 1000;
    }

    // Count customer_breakdowns by depot
    diagStatus('Counting customer breakdowns...');
    const allCBDepots = [];
    offset = 0;
    while (true) {
      const page = await sbFetch('customer_breakdowns?select=depot&limit=1000&offset=' + offset + '&order=id');
      allCBDepots.push(...page);
      if (page.length < 1000) break;
      offset += 1000;
    }

    // ── Analysis ──
    const jobsByDepot = {};
    let totalRev = 0, totalCost = 0, totalProfit = 0;
    let zeroRevCount = 0, zeroRevNorth = 0, zeroRevSouth = 0;
    let nullProfitCount = 0;
    const weekRevMap = {};

    allJobs.forEach(j => {
      const d = j.depot || 'null/empty';
      if (!jobsByDepot[d]) jobsByDepot[d] = { count: 0, revenue: 0, cost: 0, profit: 0 };
      jobsByDepot[d].count++;
      const rev = Number(j.revenue || 0);
      const cost = Number(j.cost || 0);
      const prof = Number(j.profit || 0);
      jobsByDepot[d].revenue += rev;
      jobsByDepot[d].cost += cost;
      jobsByDepot[d].profit += prof;
      totalRev += rev;
      totalCost += cost;
      totalProfit += prof;
      if (rev === 0) { zeroRevCount++; if (d === 'north') zeroRevNorth++; if (d === 'south') zeroRevSouth++; }
      if (j.profit === null || j.profit === undefined || j.profit === '') nullProfitCount++;
      const wk = j.week_label;
      if (!weekRevMap[wk]) weekRevMap[wk] = { jobs: 0, rev: 0, cost: 0 };
      weekRevMap[wk].jobs++;
      weekRevMap[wk].rev += rev;
      weekRevMap[wk].cost += cost;
    });

    const cbByDepot = {};
    allCBDepots.forEach(c => { const d = c.depot || 'null/empty'; cbByDepot[d] = (cbByDepot[d] || 0) + 1; });

    const wsWithData = ws.filter(w => w.job_count > 0);
    const wsEmpty = ws.filter(w => w.job_count === 0);
    const totalJobsInWS = ws.reduce((s, w) => s + (w.job_count || 0), 0);
    const avgRevPerJob = allJobs.length > 0 ? totalRev / allJobs.length : 0;

    // Sample jobs (first 10 with revenue > 0, first 10 with revenue = 0)
    const sampleWithRev = allJobs.filter(j => Number(j.revenue || 0) > 0).slice(0, 5);
    const sampleNoRev = allJobs.filter(j => Number(j.revenue || 0) === 0).slice(0, 5);

    // Top 5 weekly revenues
    const weekRevSorted = Object.entries(weekRevMap).map(([wk, d]) => ({ wk, ...d })).sort((a, b) => b.rev - a.rev).slice(0, 5);

    // ── Build HTML ──
    let html = '<div class="card"><h3 style="margin-bottom:16px">Data Diagnostics Report</h3>';

    // Section 1: Table counts
    html += '<h4 style="color:#60a5fa;margin-bottom:8px">Table Overview</h4>';
    html += '<table style="width:100%;font-size:13px;margin-bottom:16px"><thead><tr><th style="text-align:left;padding:6px">Table</th><th style="text-align:right;padding:6px">Total Rows</th><th style="text-align:left;padding:6px">By Depot</th></tr></thead><tbody>';
    html += '<tr><td style="padding:6px;font-weight:600">jobs</td><td style="padding:6px;text-align:right">' + allJobs.length.toLocaleString() + '</td><td style="padding:6px">' + Object.entries(jobsByDepot).map(([d, v]) => '<span class="pill pg" style="background:#1e3a5f;color:#60a5fa;margin-right:4px">' + d + ': ' + v.count.toLocaleString() + '</span>').join('') + '</td></tr>';
    html += '<tr><td style="padding:6px;font-weight:600">customer_breakdowns</td><td style="padding:6px;text-align:right">' + allCBDepots.length.toLocaleString() + '</td><td style="padding:6px">' + Object.entries(cbByDepot).map(([d, c]) => '<span class="pill pg" style="background:#1e3a5f;color:#60a5fa;margin-right:4px">' + d + ': ' + c.toLocaleString() + '</span>').join('') + '</td></tr>';
    html += '<tr><td style="padding:6px;font-weight:600">weekly_summaries</td><td style="padding:6px;text-align:right">' + ws.length + '</td><td style="padding:6px"><span class="pill pg" style="background:#064e3b;color:#6ee7b7">' + wsWithData.length + ' with data</span> <span class="pill pg" style="background:#7f1d1d;color:#fca5a5">' + wsEmpty.length + ' empty stubs</span></td></tr>';
    html += '</tbody></table>';

    // Section 2: Revenue Health Check
    html += '<h4 style="color:#fbbf24;margin-bottom:8px">Revenue Health Check</h4>';
    html += '<table style="width:100%;font-size:13px;margin-bottom:8px"><tbody>';
    html += '<tr><td style="padding:6px">Total Revenue (all jobs)</td><td style="padding:6px;text-align:right;font-weight:600">\u00A3' + totalRev.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td></tr>';
    html += '<tr><td style="padding:6px">Total Cost (all jobs)</td><td style="padding:6px;text-align:right">\u00A3' + totalCost.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td></tr>';
    html += '<tr><td style="padding:6px">Total Profit (all jobs)</td><td style="padding:6px;text-align:right">\u00A3' + totalProfit.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td></tr>';
    html += '<tr><td style="padding:6px">Avg Revenue per Job</td><td style="padding:6px;text-align:right">\u00A3' + avgRevPerJob.toFixed(2) + '</td></tr>';
    html += '<tr><td style="padding:6px;color:#fca5a5;font-weight:600">Jobs with \u00A30 revenue</td><td style="padding:6px;text-align:right;color:#fca5a5;font-weight:600">' + zeroRevCount.toLocaleString() + ' / ' + allJobs.length.toLocaleString() + ' (' + (allJobs.length > 0 ? (zeroRevCount / allJobs.length * 100).toFixed(1) : 0) + '%)</td></tr>';
    if (zeroRevCount > 0) {
      html += '<tr><td style="padding:6px;color:#94a3b8">&nbsp;&nbsp;Zero-rev North</td><td style="padding:6px;text-align:right">' + zeroRevNorth.toLocaleString() + '</td></tr>';
      html += '<tr><td style="padding:6px;color:#94a3b8">&nbsp;&nbsp;Zero-rev South</td><td style="padding:6px;text-align:right">' + zeroRevSouth.toLocaleString() + '</td></tr>';
    }
    html += '<tr><td style="padding:6px;color:#fbbf24">Jobs with null/empty profit</td><td style="padding:6px;text-align:right;color:#fbbf24">' + nullProfitCount.toLocaleString() + '</td></tr>';
    html += '</tbody></table>';

    // Revenue by depot
    html += '<h4 style="color:#60a5fa;margin-bottom:8px">Revenue by Depot</h4>';
    html += '<table style="width:100%;font-size:13px;margin-bottom:16px"><thead><tr><th style="text-align:left;padding:6px">Depot</th><th style="text-align:right;padding:6px">Jobs</th><th style="text-align:right;padding:6px">Revenue</th><th style="text-align:right;padding:6px">Cost</th><th style="text-align:right;padding:6px">Avg Rev/Job</th></tr></thead><tbody>';
    Object.entries(jobsByDepot).forEach(([d, v]) => {
      html += '<tr><td style="padding:6px;font-weight:600">' + d + '</td><td style="padding:6px;text-align:right">' + v.count.toLocaleString() + '</td><td style="padding:6px;text-align:right">\u00A3' + v.revenue.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td><td style="padding:6px;text-align:right">\u00A3' + v.cost.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td><td style="padding:6px;text-align:right">\u00A3' + (v.count > 0 ? (v.revenue / v.count).toFixed(2) : '0.00') + '</td></tr>';
    });
    html += '</tbody></table>';

    // Top 5 weeks by revenue
    html += '<h4 style="color:#60a5fa;margin-bottom:8px">Top 5 Weeks by Revenue</h4>';
    html += '<table style="width:100%;font-size:13px;margin-bottom:16px"><thead><tr><th style="text-align:left;padding:6px">Week</th><th style="text-align:right;padding:6px">Jobs</th><th style="text-align:right;padding:6px">Revenue</th><th style="text-align:right;padding:6px">Avg/Job</th></tr></thead><tbody>';
    weekRevSorted.forEach(w => {
      html += '<tr><td style="padding:6px">' + w.wk + '</td><td style="padding:6px;text-align:right">' + w.jobs + '</td><td style="padding:6px;text-align:right">\u00A3' + w.rev.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2}) + '</td><td style="padding:6px;text-align:right">\u00A3' + (w.jobs > 0 ? (w.rev / w.jobs).toFixed(2) : '0') + '</td></tr>';
    });
    html += '</tbody></table>';

    // Sample jobs
    html += '<h4 style="color:#60a5fa;margin-bottom:8px">Sample Jobs (with revenue)</h4>';
    html += '<table style="width:100%;font-size:12px;margin-bottom:16px"><thead><tr><th style="text-align:left;padding:4px">Job No</th><th style="text-align:left;padding:4px">Customer</th><th style="text-align:left;padding:4px">Depot</th><th style="text-align:left;padding:4px">Week</th><th style="text-align:right;padding:4px">Revenue</th><th style="text-align:right;padding:4px">Cost</th><th style="text-align:right;padding:4px">Profit</th></tr></thead><tbody>';
    sampleWithRev.forEach(j => {
      html += '<tr><td style="padding:4px">' + j.job_no + '</td><td style="padding:4px">' + (j.customer_name || '').substring(0, 25) + '</td><td style="padding:4px">' + (j.depot || '') + '</td><td style="padding:4px">' + j.week_label + '</td><td style="padding:4px;text-align:right">\u00A3' + Number(j.revenue || 0).toFixed(2) + '</td><td style="padding:4px;text-align:right">\u00A3' + Number(j.cost || 0).toFixed(2) + '</td><td style="padding:4px;text-align:right">\u00A3' + Number(j.profit || 0).toFixed(2) + '</td></tr>';
    });
    html += '</tbody></table>';

    if (sampleNoRev.length > 0) {
      html += '<h4 style="color:#fca5a5;margin-bottom:8px">Sample Jobs (ZERO revenue)</h4>';
      html += '<table style="width:100%;font-size:12px;margin-bottom:16px"><thead><tr><th style="text-align:left;padding:4px">Job No</th><th style="text-align:left;padding:4px">Customer</th><th style="text-align:left;padding:4px">Depot</th><th style="text-align:left;padding:4px">Week</th><th style="text-align:right;padding:4px">Revenue</th><th style="text-align:right;padding:4px">Cost</th><th style="text-align:right;padding:4px">Profit</th></tr></thead><tbody>';
      sampleNoRev.forEach(j => {
        html += '<tr style="color:#fca5a5"><td style="padding:4px">' + j.job_no + '</td><td style="padding:4px">' + (j.customer_name || '').substring(0, 25) + '</td><td style="padding:4px">' + (j.depot || '') + '</td><td style="padding:4px">' + j.week_label + '</td><td style="padding:4px;text-align:right">\u00A30.00</td><td style="padding:4px;text-align:right">\u00A3' + Number(j.cost || 0).toFixed(2) + '</td><td style="padding:4px;text-align:right">\u00A3' + Number(j.profit || 0).toFixed(2) + '</td></tr>';
      });
      html += '</tbody></table>';
    }

    // Warnings
    if (zeroRevCount > allJobs.length * 0.1) {
      html += '<div style="margin-top:12px;padding:10px;background:#7f1d1d33;border-radius:6px"><p style="font-size:12px;color:#fca5a5;font-weight:600">\u26A0 ' + ((zeroRevCount / allJobs.length) * 100).toFixed(1) + '% of jobs have \u00A30 revenue! This likely means the "Revenue" column in the consignment log wasn\'t mapped correctly. Check your Excel file — the column might be named "Charge", "Total", "Sale Price", or similar instead of "Revenue".</p></div>';
    }
    if (nullProfitCount > allJobs.length * 0.5) {
      html += '<div style="margin-top:8px;padding:10px;background:#78350f33;border-radius:6px"><p style="font-size:12px;color:#fbbf24;font-weight:600">\u26A0 ' + nullProfitCount.toLocaleString() + ' jobs have null/empty profit. The upload parser calculates revenue and cost but not profit. Run Rebuild Summaries or add profit calculation to the upload.</p></div>';
    }
    if (wsEmpty.length > 0) {
      html += '<div style="margin-top:8px;padding:10px;background:#7f1d1d33;border-radius:6px"><p style="font-size:12px;color:#fca5a5;font-weight:600">Found ' + wsEmpty.length + ' empty weekly_summary stubs.</p>';
      html += '<button class="cfg-btn cfg-btn-sm" style="background:#7f1d1d;color:#fca5a5;margin-top:8px" onclick="cleanEmptyWeekStubs()">Remove Empty Stubs</button></div>';
    }
    if (allJobs.length !== totalJobsInWS) {
      html += '<div style="margin-top:8px;padding:10px;background:#78350f33;border-radius:6px"><p style="font-size:12px;color:#fbbf24;font-weight:600">Mismatch: jobs=' + allJobs.length.toLocaleString() + ' vs weekly_summaries total=' + totalJobsInWS.toLocaleString() + '. Run "Rebuild Summaries".</p></div>';
    }

    html += '<p style="font-size:11px;color:#64748b;margin-top:12px">Ran at ' + new Date().toLocaleTimeString() + '</p></div>';
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = '<div class="card"><p style="color:#fca5a5">Diagnostics error: ' + e.message + '</p></div>';
  }
}

async function cleanEmptyWeekStubs() {
  if (!confirm('Remove weekly_summary rows that have zero jobs? This is safe — the Rebuild Summaries function will recreate them if needed.')) return;
  try {
    await sbWrite('DELETE', 'weekly_summaries?job_count=eq.0');
    toast('Empty weekly stubs removed. Reloading...');
    setTimeout(() => location.reload(), 1500);
  } catch(e) {
    toast('Error: ' + e.message, true);
  }
}

async function rebuildSummaryTables() {
  if (!confirm('Rebuild weekly_summaries, customer_breakdowns, and vehicle_breakdowns from the jobs table?\n\nThis will DELETE existing summary data and regenerate it.')) return;

  const progress = document.getElementById('uploadProgress');
  progress.style.display = 'block';
  progress.innerHTML = '<div class="card"><h3>Rebuilding summary tables...</h3><div id="rebuildBar" style="background:#334155;border-radius:6px;height:24px;overflow:hidden;margin:12px 0"><div id="rebuildBarFill" style="background:#3b82f6;height:100%;width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white"></div></div><p id="rebuildStatus" style="font-size:13px;color:#94a3b8">Fetching all jobs...</p></div>';

  function setProgress(pct, msg) {
    document.getElementById('rebuildBarFill').style.width = pct + '%';
    document.getElementById('rebuildBarFill').textContent = pct + '%';
    document.getElementById('rebuildStatus').textContent = msg;
  }

  try {
    // Step 1: Fetch all jobs INCLUDING depot column (10%)
    setProgress(5, 'Fetching all jobs from database...');
    const allJobs = await sbFetchAll('jobs?select=week_label,job_no,customer_name,sales_name,depot,revenue,cost,profit,vehicle,collection_postcode,delivery_postcode');
    if (allJobs.length === 0) {
      setProgress(100, 'No jobs found in database. Nothing to rebuild.');
      return;
    }
    setProgress(10, 'Loaded ' + allJobs.length.toLocaleString() + ' jobs. Building aggregations...');

    // ── Build weekly_summaries (separate row per depot) ──
    // Aggregate per (week_label, depot) pair
    const weekAgg = {};
    allJobs.forEach(j => {
      const depot = j.depot || 'north';
      const key = j.week_label + '||' + depot;
      if (!weekAgg[key]) weekAgg[key] = { week_label: j.week_label, depot: depot, job_count: 0, total_revenue: 0, total_cost: 0, total_profit: 0 };
      weekAgg[key].job_count++;
      weekAgg[key].total_revenue += Number(j.revenue || 0);
      weekAgg[key].total_cost += Number(j.cost || 0);
      weekAgg[key].total_profit += Number(j.profit || 0);
    });

    // Step 2: Delete old breakdowns (these have no FK dependencies)
    setProgress(12, 'Deleting old customer breakdowns...');
    await sbWrite('DELETE', 'customer_breakdowns?week_label=neq.IMPOSSIBLE');
    setProgress(15, 'Deleting old vehicle breakdowns...');
    await sbWrite('DELETE', 'vehicle_breakdowns?week_label=neq.IMPOSSIBLE');
    setProgress(18, 'Deleting old region breakdowns...');
    await sbWrite('DELETE', 'region_breakdowns?week_label=neq.IMPOSSIBLE');

    // Step 3: UPSERT new per-depot weekly_summaries (insert first, then clean old 'all' rows)
    // Can't delete weekly_summaries first — jobs FK constraint prevents it
    setProgress(20, 'Upserting ' + Object.keys(weekAgg).length + ' weekly summaries (per depot)...');
    const weekRows = Object.values(weekAgg).map(d => {
      const wk = d.week_label;
      const [y, w] = [parseInt(wk.split('-W')[0]), parseInt(wk.split('-W')[1])];
      const jan4 = new Date(y, 0, 4);
      const mon = new Date(jan4.getTime() - ((jan4.getDay() + 6) % 7) * 86400000 + (w - 1) * 7 * 86400000);
      const ws = mon.toISOString().split('T')[0];
      return {
        week_label: wk, week_start: ws, depot: d.depot,
        job_count: d.job_count,
        total_revenue: Math.round(d.total_revenue * 100) / 100,
        total_cost: Math.round(d.total_cost * 100) / 100,
        total_profit: Math.round(d.total_profit * 100) / 100,
        margin_pct: d.total_revenue > 0 ? Math.round(d.total_profit / d.total_revenue * 10000) / 100 : 0
      };
    }).sort((a, b) => a.week_label.localeCompare(b.week_label));

    // Two-pass approach: first try to UPDATE existing rows, then INSERT new ones
    // This avoids relying on PostgREST upsert conflict resolution which can silently fail
    // Pass 1: PATCH (update) each existing weekly_summary row with correct values
    setProgress(22, 'Updating existing weekly summaries...');
    for (const row of weekRows) {
      try {
        await ensureFreshToken();
        const filter = 'weekly_summaries?week_label=eq.' + encodeURIComponent(row.week_label) + '&depot=eq.' + encodeURIComponent(row.depot);
        await sbWrite('PATCH', filter, {
          week_start: row.week_start,
          job_count: row.job_count,
          total_revenue: row.total_revenue,
          total_cost: row.total_cost,
          total_profit: row.total_profit,
          margin_pct: row.margin_pct
        });
      } catch(e) { /* row doesn't exist yet — will be inserted in pass 2 */ }
    }
    // Pass 2: INSERT any rows that don't already exist (ignore-duplicates skips existing ones)
    setProgress(24, 'Inserting new weekly summaries...');
    for (let i = 0; i < weekRows.length; i += 500) {
      await ensureFreshToken();
      const r = await fetch(SB_URL + '/rest/v1/weekly_summaries', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken(), 'Content-Type': 'application/json', 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
        body: JSON.stringify(weekRows.slice(i, i + 500))
      });
      if (!r.ok && r.status !== 409) { const t = await r.text(); console.warn('Weekly summary insert warning:', t); }
    }

    // Now clean up old depot='all' rows (safe because per-depot rows now satisfy the FK)
    setProgress(25, 'Cleaning up old combined-depot summaries...');
    try {
      await sbWrite('DELETE', 'weekly_summaries?depot=eq.all');
    } catch(e) {
      console.warn('Could not delete depot=all rows (may not exist):', e.message);
    }

    // Also delete any stale weekly_summary stubs (job_count=0) that no longer have jobs
    const weeksWithJobs = new Set(Object.values(weekAgg).map(d => d.week_label));
    try {
      const existingWS = await sbFetch('weekly_summaries?select=week_label,depot&limit=1000');
      const staleRows = existingWS.filter(w => !weeksWithJobs.has(w.week_label));
      for (const sw of staleRows) {
        try { await sbWrite('DELETE', 'weekly_summaries?week_label=eq.' + encodeURIComponent(sw.week_label) + '&depot=eq.' + encodeURIComponent(sw.depot)); } catch(e) { /* FK — skip */ }
      }
    } catch(e) { /* ignore */ }

    setProgress(30, 'Weekly summaries done (' + weekRows.length + ' rows). Building customer breakdowns...');

    // Step 5: Build customer_breakdowns (with depot from each job) (30-60%)
    const custAgg = {};
    allJobs.forEach(j => {
      const depot = j.depot || 'north';
      const key = j.week_label + '||' + (j.customer_name || '') + '||' + depot;
      if (!custAgg[key]) custAgg[key] = { week_label: j.week_label, customer_name: j.customer_name || '', depot: depot, jobs: 0, revenue: 0, cost: 0, profit: 0 };
      custAgg[key].jobs++;
      custAgg[key].revenue += Number(j.revenue || 0);
      custAgg[key].cost += Number(j.cost || 0);
      custAgg[key].profit += Number(j.profit || 0);
    });
    const custRows = Object.values(custAgg).map(d => ({
      week_label: d.week_label, customer_name: d.customer_name, depot: d.depot,
      jobs: d.jobs,
      revenue: Math.round(d.revenue * 100) / 100,
      cost: Math.round(d.cost * 100) / 100,
      profit: Math.round(d.profit * 100) / 100
    }));

    let custUploaded = 0;
    for (let i = 0; i < custRows.length; i += 500) {
      await sbWrite('POST', 'customer_breakdowns', custRows.slice(i, i + 500));
      custUploaded += Math.min(500, custRows.length - i);
      const pct = 30 + Math.round((custUploaded / custRows.length) * 30);
      setProgress(pct, 'Customer breakdowns: ' + custUploaded.toLocaleString() + ' / ' + custRows.length.toLocaleString() + ' rows...');
    }
    setProgress(60, 'Customer breakdowns done (' + custRows.length.toLocaleString() + ' rows). Building vehicle breakdowns...');

    // Step 6: Build vehicle_breakdowns (60-80%)
    const vehAgg = {};
    allJobs.forEach(j => {
      const key = j.week_label + '||' + (j.vehicle || '');
      if (!vehAgg[key]) vehAgg[key] = { week_label: j.week_label, vehicle_type: j.vehicle || '', jobs: 0, revenue: 0, cost: 0, profit: 0 };
      vehAgg[key].jobs++;
      vehAgg[key].revenue += Number(j.revenue || 0);
      vehAgg[key].cost += Number(j.cost || 0);
      vehAgg[key].profit += Number(j.profit || 0);
    });
    const vehRows = Object.values(vehAgg).map(d => ({
      week_label: d.week_label, vehicle_type: d.vehicle_type,
      jobs: d.jobs,
      revenue: Math.round(d.revenue * 100) / 100,
      cost: Math.round(d.cost * 100) / 100,
      profit: Math.round(d.profit * 100) / 100
    }));

    let vehUploaded = 0;
    for (let i = 0; i < vehRows.length; i += 500) {
      await sbWrite('POST', 'vehicle_breakdowns', vehRows.slice(i, i + 500));
      vehUploaded += Math.min(500, vehRows.length - i);
      const pct = 60 + Math.round((vehUploaded / vehRows.length) * 20);
      setProgress(pct, 'Vehicle breakdowns: ' + vehUploaded.toLocaleString() + ' / ' + vehRows.length.toLocaleString() + ' rows...');
    }
    setProgress(80, 'Vehicle breakdowns done (' + vehRows.length.toLocaleString() + ' rows). Building region breakdowns...');

    // ── Build region_breakdowns (use postcode prefix as region) ──
    const regAgg = {};
    allJobs.forEach(j => {
      const colPC = (j.collection_postcode || '').split(' ')[0] || 'Unknown';
      const delPC = (j.delivery_postcode || '').split(' ')[0] || 'Unknown';
      const colRegion = colPC.replace(/[0-9]/g, '') || 'Unknown';
      const delRegion = delPC.replace(/[0-9]/g, '') || 'Unknown';
      const key = j.week_label + '||' + colRegion + '||' + delRegion;
      if (!regAgg[key]) regAgg[key] = { week_label: j.week_label, col_region: colRegion, del_region: delRegion, jobs: 0, revenue: 0, cost: 0, profit: 0 };
      regAgg[key].jobs++;
      regAgg[key].revenue += Number(j.revenue || 0);
      regAgg[key].cost += Number(j.cost || 0);
      regAgg[key].profit += Number(j.profit || 0);
    });
    const regRows = Object.values(regAgg).map(d => ({
      week_label: d.week_label, col_region: d.col_region, del_region: d.del_region,
      jobs: d.jobs,
      revenue: Math.round(d.revenue * 100) / 100,
      cost: Math.round(d.cost * 100) / 100,
      profit: Math.round(d.profit * 100) / 100
    }));

    let regUploaded = 0;
    for (let i = 0; i < regRows.length; i += 500) {
      await sbWrite('POST', 'region_breakdowns', regRows.slice(i, i + 500));
      regUploaded += Math.min(500, regRows.length - i);
      const pct = 80 + Math.round((regUploaded / regRows.length) * 18);
      setProgress(pct, 'Region breakdowns: ' + regUploaded.toLocaleString() + ' / ' + regRows.length.toLocaleString() + ' rows...');
    }

    // Count depots in customer_breakdowns for verification
    const depotCounts = {};
    custRows.forEach(r => { depotCounts[r.depot] = (depotCounts[r.depot] || 0) + 1; });
    const depotSummary = Object.entries(depotCounts).map(([d, c]) => d + ': ' + c.toLocaleString()).join(', ');

    setProgress(100, '');
    document.getElementById('rebuildStatus').innerHTML = `<span style="color:#6ee7b7;font-weight:600">All summary tables rebuilt!</span><br>
      <span style="font-size:12px;color:#94a3b8">
        ${allJobs.length.toLocaleString()} jobs processed &rarr;
        ${weekRows.length} weeks,
        ${custRows.length.toLocaleString()} customer rows (${depotSummary}),
        ${vehRows.length.toLocaleString()} vehicle rows,
        ${regRows.length.toLocaleString()} region rows
      </span>
      <br><button class="cfg-btn cfg-btn-primary cfg-btn-sm" onclick="location.reload()" style="margin-top:8px">Reload Dashboard</button>`;
    toast('Summary tables rebuilt: ' + allJobs.length.toLocaleString() + ' jobs, ' + custRows.length.toLocaleString() + ' customer rows');
  } catch(e) {
    document.getElementById('rebuildBarFill').style.background = '#ef4444';
    document.getElementById('rebuildStatus').innerHTML = '<span style="color:#fca5a5">Error during rebuild: ' + e.message + '</span><br><span style="font-size:12px;color:#94a3b8">The rebuild may be partially complete. Try refreshing the page and running it again, or use Data Diagnostics to check the current state.</span>';
    toast('Error rebuilding: ' + e.message, true);
  }
}

// ── Init: check for existing session, otherwise show login ──
// Listen for auth state changes (handles automatic token refresh)
sbAuth.auth.onAuthStateChange((event, session) => {
  if (event === 'TOKEN_REFRESHED' && session) {
    currentSession = session;
    console.log('Auth token refreshed');
  } else if (event === 'SIGNED_OUT') {
    currentSession = null;
  }
});

(async function checkSession() {
  try {
    const { data: { session }, error } = await sbAuth.auth.getSession();
    if (error) { console.warn('Session restore error:', error.message); return; }
    if (session) {
      currentSession = session;
      await loadProfile();
      showApp();
    }
  } catch(e) {
    console.warn('Session check failed (may be Safari private browsing):', e.message);
    // Login screen is already visible — user can sign in manually
  }
})();

let _dataRangeFrom = null;  // tracks which weeks are currently loaded
let _dataRangeTo = null;
let _isLoadingData = false;

// Fetch the heavy data tables filtered by week range
async function fetchRangeData(fromWeek, toWeek) {
  console.log('📊 Fetching range data:', fromWeek, '→', toWeek);
  const wkFilter = '&week_label=gte.' + fromWeek + '&week_label=lte.' + toWeek;
  const baseJobCols = 'week_label,job_no,customer_name,sales_name,depot,revenue,cost,profit,vehicle,collection_postcode,delivery_postcode,ready_at,booked_at,delivery_deadline,pob_time,pod_time';
  const extraJobCols = baseJobCols + ',supplier,call_sign';

  const [rawCustomers, rawRegions, rawVehicles] = await Promise.all([
    sbFetchAll('customer_breakdowns?select=week_label,customer_name,depot,jobs,revenue,cost,profit' + wkFilter),
    sbFetchAll('region_breakdowns?select=week_label,col_region,del_region,jobs,revenue,cost,profit' + wkFilter),
    sbFetchAll('vehicle_breakdowns?select=week_label,vehicle_type,jobs,revenue,cost,profit' + wkFilter),
  ]);

  // Try fetching jobs with supplier+call_sign columns; fall back to base columns if they don't exist
  let rawJobs;
  try {
    rawJobs = await sbFetchAll('jobs?select=' + extraJobCols + wkFilter);
  } catch (e) {
    console.log('supplier/call_sign columns not available, using base columns');
    rawJobs = await sbFetchAll('jobs?select=' + baseJobCols + wkFilter);
  }

  console.log('📊 Loaded:', rawJobs.length, 'jobs,', rawCustomers.length, 'customer breakdowns');
  return { rawCustomers, rawRegions, rawVehicles, rawJobs };
}

async function loadDashboardData() {
  try {
    // Step 1: Fetch lightweight data first (weeks + config — very fast)
    const [weeks, teams, teamRules, teamManualCustomers, customerAliases, repAliases, commissionTiers, repCommissionTiers, repSettings, accountOverrides, allCustomerNames, allRepNames] = await Promise.all([
      sbFetch('weekly_summaries?order=week_start.asc&select=week_label,week_start,job_count,total_revenue,total_cost,total_profit,margin_pct&limit=500'),
      sbFetch('teams?select=id,name,depot,capacity_jobs_per_week'),
      sbFetch('team_rules?select=id,team_id,field,operator,value'),
      sbFetch('team_manual_customers?select=id,team_id,customer_name'),
      sbFetch('customer_aliases?select=id,alias_name,canonical_name,depot'),
      sbFetch('rep_aliases?select=id,alias_name,canonical_name,depot'),
      sbFetch('commission_tiers?select=id,depot,min_margin,max_margin,commission_pct').catch(() => []),
      sbFetch('rep_commission_tiers?select=id,rep_name,depot,min_margin,max_margin,commission_pct').catch(() => []),
      sbFetch('rep_settings?select=id,rep_name,depot,commission_months,revenue_target,run_rate_target,fy_label').catch(() => []),
      sbFetch('account_overrides?select=id,customer_name,depot,commission_months,start_date,assigned_rep,notes').catch(() => []),
      // Lightweight DISTINCT lists for Settings page dropdowns (NOT full table scans)
      // Use limit=1000 on customer_breakdowns grouped by customer_name (one row per customer is enough)
      sbFetch('customer_breakdowns?select=customer_name,depot&order=customer_name&limit=1000').catch(() => []),
      sbFetch('account_overrides?select=customer_name,depot,assigned_rep&limit=1000').catch(() => []),
    ]);

    // Build lightweight customer list from customer_breakdowns (deduplicated)
    const custMap = new Map();
    (allCustomerNames || []).forEach(c => { if (c.customer_name) custMap.set(c.customer_name, c); });
    // Build lightweight rep list from account_overrides assigned_rep field
    const repMap = new Map();
    const aoReps = allRepNames || []; // actually account_overrides with assigned_rep
    aoReps.forEach(ao => { if (ao.assigned_rep) repMap.set(ao.assigned_rep + '|' + (ao.depot || 'all'), { sales_name: ao.assigned_rep, depot: ao.depot || 'all' }); });

    // Aggregate per-depot weekly_summaries into combined rows (one per week)
    // This handles the case where rebuild creates separate north/south rows
    const weekCombined = {};
    weeks.forEach(w => {
      const wk = w.week_label;
      if (!weekCombined[wk]) weekCombined[wk] = { week_label: wk, week_start: w.week_start, job_count: 0, total_revenue: 0, total_cost: 0, total_profit: 0, margin_pct: 0 };
      weekCombined[wk].job_count += Number(w.job_count || 0);
      weekCombined[wk].total_revenue += Number(w.total_revenue || 0);
      weekCombined[wk].total_cost += Number(w.total_cost || 0);
      weekCombined[wk].total_profit += Number(w.total_profit || 0);
      if (!weekCombined[wk].week_start && w.week_start) weekCombined[wk].week_start = w.week_start;
    });
    const combinedWeeks = Object.values(weekCombined).sort((a, b) => a.week_label.localeCompare(b.week_label));
    combinedWeeks.forEach(w => {
      w.margin_pct = w.total_revenue > 0 ? Math.round(w.total_profit / w.total_revenue * 10000) / 100 : 0;
    });

    ALL_DATA = { weeks: combinedWeeks, weeksRaw: weeks, rawCustomers: [], rawRegions: [], rawVehicles: [], rawJobs: [], teams, teamRules, teamManualCustomers, customerAliases, repAliases, commissionTiers, repCommissionTiers, repSettings, accountOverrides, allCustomerNames: Array.from(custMap.values()), allRepNames: Array.from(repMap.values()) };

    // Populate week dropdowns (cap to 24 weeks to avoid long lists)
    const fromSel = document.getElementById('fromWeek');
    const toSel = document.getElementById('toWeek');
    if (combinedWeeks.length > 0) {
      // Only show the 24 most recent weeks in dropdowns
      const weeksWithData = combinedWeeks.filter(w => w.job_count > 0);
      const dataWeeks = weeksWithData.length > 0 ? weeksWithData : combinedWeeks;
      const dropdownN = 24;
      const startIdxForDropdown = Math.max(0, dataWeeks.length - dropdownN);
      const weeksForDropdown = dataWeeks.slice(startIdxForDropdown);

      // Populate dropdowns with only the 24-week window
      weeksForDropdown.forEach(w => {
        fromSel.add(new Option(fWk(w.week_label), w.week_label));
        toSel.add(new Option(fWk(w.week_label), w.week_label));
      });

      // Default to last 12 weeks WITH DATA
      const defaultN = 12;
      const startIdx = Math.max(0, dataWeeks.length - defaultN);
      filterFrom = dataWeeks[startIdx].week_label;
      filterTo = dataWeeks[dataWeeks.length - 1].week_label;
      fromSel.value = filterFrom;
      toSel.value = filterTo;

      const totalWeeks = dataWeeks.length;
      const showingWeeks = Math.min(defaultN, dataWeeks.length);
      document.getElementById('hdr-info').textContent = totalWeeks + ' weeks total \u00B7 showing last ' + showingWeeks + ' (' + dropdownN + '-week window available)';

      // Step 2: Fetch only the data for the default 12-week range + quote data in parallel
      await Promise.all([loadRangeData(filterFrom, filterTo), loadQuoteData()]);
    } else {
      document.getElementById('hdr-info').textContent = 'No data loaded \u2014 go to Config to upload consignment files';
      loadQuoteData(); // still load quote data even if no consignment data
      applyFilter();
    }
  } catch(e) {
    document.getElementById('main').innerHTML = '<div class="loading" style="color:#f87171">Error loading data: ' + e.message + '</div>';
  }
}

async function loadRangeData(fromWeek, toWeek) {
  if (_isLoadingData) return;
  // Skip re-fetch if we already have this range loaded
  if (_dataRangeFrom === fromWeek && _dataRangeTo === toWeek) {
    applyFilter();
    return;
  }
  _isLoadingData = true;
  const el = document.getElementById('main');
  const rangeWeeks = (ALL_DATA.weeks || []).filter(w => w.week_label >= fromWeek && w.week_label <= toWeek);
  el.innerHTML = '<div class="loading"><span class="spin"></span> Loading ' + rangeWeeks.length + ' weeks of data...</div>';

  try {
    const rangeData = await fetchRangeData(fromWeek, toWeek);
    ALL_DATA.rawCustomers = rangeData.rawCustomers;
    ALL_DATA.rawRegions = rangeData.rawRegions;
    ALL_DATA.rawVehicles = rangeData.rawVehicles;
    ALL_DATA.rawJobs = rangeData.rawJobs;
    _dataRangeFrom = fromWeek;
    _dataRangeTo = toWeek;

    // Update rep names from loaded jobs (supplements the lightweight startup list)
    const repMap = new Map();
    (ALL_DATA.allRepNames || []).forEach(r => repMap.set(r.sales_name + '|' + r.depot, r));
    rangeData.rawJobs.forEach(j => {
      if (j.sales_name) repMap.set(j.sales_name + '|' + (j.depot || 'all'), { sales_name: j.sales_name, depot: j.depot || 'all' });
    });
    ALL_DATA.allRepNames = Array.from(repMap.values());

    // Also update customer names from loaded breakdowns
    const custNameMap = new Map();
    (ALL_DATA.allCustomerNames || []).forEach(c => custNameMap.set(c.customer_name, c));
    rangeData.rawCustomers.forEach(c => {
      if (c.customer_name) custNameMap.set(c.customer_name, c);
    });
    ALL_DATA.allCustomerNames = Array.from(custNameMap.values());

    const nWeeks = rangeWeeks.length;
    const nJobs = rangeData.rawJobs.length;
    const weeksWithData = (ALL_DATA.weeks || []).filter(w => w.job_count > 0);
    document.getElementById('hdr-info').textContent = weeksWithData.length + ' weeks with data \u00B7 showing ' + nWeeks + ' (' + nJobs.toLocaleString() + ' jobs)';

    applyFilter();
  } catch(e) {
    el.innerHTML = '<div class="loading" style="color:#f87171">Error loading range data: ' + e.message + '</div>';
  } finally {
    _isLoadingData = false;
  }
}

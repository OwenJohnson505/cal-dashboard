// ── Data Health Checks ──
// Helper: generate all ISO week labels between two labels (inclusive)
function allWeeksBetween(startLabel, endLabel) {
  const weeks = [];
  const [sy, sw] = [parseInt(startLabel.split('-W')[0]), parseInt(startLabel.split('-W')[1])];
  const [ey, ew] = [parseInt(endLabel.split('-W')[0]), parseInt(endLabel.split('-W')[1])];
  // Walk week-by-week using actual dates to handle year boundaries correctly
  const jan4s = new Date(sy, 0, 4);
  const startMon = new Date(jan4s.getTime() - ((jan4s.getDay() + 6) % 7) * 86400000 + (sw - 1) * 7 * 86400000);
  let d = new Date(startMon);
  for (let safety = 0; safety < 200; safety++) {
    const wl = isoWeekFromDate(d);
    weeks.push(wl);
    if (wl === endLabel) break;
    d.setDate(d.getDate() + 7);
  }
  return weeks;
}

async function runDataHealthChecks() {
  const container = document.getElementById('dataHealthContainer');
  if (!container) return;

  try {
    const thisWeek = isoWeekFromDate(new Date());
    const depots = (selectedDepot === 'both') ? ['north', 'south'] : [selectedDepot || 'north'];

    // Fetch all data in parallel
    const [allWS, allConv, allNonConv, allCanc, accNorth, accSouth] = await Promise.all([
      sbFetchAll('weekly_summaries?select=week_label,depot,job_count,total_revenue&order=week_label.asc'),
      sbFetchAll('converted_quotes?select=week_label,depot').catch(() => []),
      sbFetchAll('non_converted_quotes?select=week_label,depot').catch(() => []),
      sbFetchAll('cancelled_quotes?select=week_label,depot').catch(() => []),
      sbFetch('account_overrides?select=id&depot=eq.north&limit=1').catch(() => []),
      sbFetch('account_overrides?select=id&depot=eq.south&limit=1').catch(() => [])
    ]);

    // Build lookup maps: { 'north': { '2026-W14': { jobs: 753, rev: 123456 } } }
    const jobMap = {};
    allWS.forEach(r => {
      if (!r.depot || r.depot === 'all') return;
      if (!jobMap[r.depot]) jobMap[r.depot] = {};
      jobMap[r.depot][r.week_label] = { jobs: r.job_count || 0, rev: r.total_revenue || 0 };
    });

    // Quote lookup: { 'north': { '2026-W14': { conv: true, nonConv: true, canc: false } } }
    const quoteMap = {};
    const ensureQ = (depot, wk) => {
      if (!quoteMap[depot]) quoteMap[depot] = {};
      if (!quoteMap[depot][wk]) quoteMap[depot][wk] = { conv: false, nonConv: false, canc: false };
    };
    allConv.forEach(r => { if (r.depot && r.week_label) { ensureQ(r.depot, r.week_label); quoteMap[r.depot][r.week_label].conv = true; } });
    allNonConv.forEach(r => { if (r.depot && r.week_label) { ensureQ(r.depot, r.week_label); quoteMap[r.depot][r.week_label].nonConv = true; } });
    allCanc.forEach(r => { if (r.depot && r.week_label) { ensureQ(r.depot, r.week_label); quoteMap[r.depot][r.week_label].canc = true; } });

    // Customer list status per depot
    const custListStatus = { north: accNorth.length > 0, south: accSouth.length > 0 };

    // Determine the full week range: earliest week across all data → current week
    const allWeekLabels = new Set();
    allWS.forEach(r => { if (r.week_label && depots.includes(r.depot)) allWeekLabels.add(r.week_label); });
    allConv.forEach(r => { if (r.week_label && depots.includes(r.depot)) allWeekLabels.add(r.week_label); });
    allNonConv.forEach(r => { if (r.week_label && depots.includes(r.depot)) allWeekLabels.add(r.week_label); });
    allCanc.forEach(r => { if (r.week_label && depots.includes(r.depot)) allWeekLabels.add(r.week_label); });
    allWeekLabels.add(thisWeek);

    const sortedWeeks = [...allWeekLabels].sort();
    const earliest = sortedWeeks[0];
    const latest = sortedWeeks[sortedWeeks.length - 1] > thisWeek ? sortedWeeks[sortedWeeks.length - 1] : thisWeek;

    // Generate continuous week sequence (no gaps)
    const allWeeks = allWeeksBetween(earliest, latest);

    // Count issues
    let totalGaps = 0;
    depots.forEach(depot => {
      allWeeks.forEach(wk => {
        const jd = (jobMap[depot] || {})[wk];
        const hasJobs = jd && jd.jobs > 0;
        if (!hasJobs) totalGaps++;
        const qd = (quoteMap[depot] || {})[wk];
        if (!qd || !qd.conv) totalGaps++;
        if (!qd || !qd.nonConv) totalGaps++;
        if (!qd || !qd.canc) totalGaps++;
      });
    });

    // ── Render ──
    let html = '';

    // Customer list warnings at the top
    depots.forEach(depot => {
      const label = depot.charAt(0).toUpperCase() + depot.slice(1);
      const hasCL = custListStatus[depot];
      const icon = hasCL ? '\u2705' : '\u274C';
      const bg = hasCL ? '#064e3b33' : '#7f1d1d33';
      const border = hasCL ? '#065f4666' : '#991b1b66';
      const textCol = hasCL ? '#6ee7b7' : '#fca5a5';
      html += '<div style="display:flex;align-items:center;gap:10px;padding:8px 12px;background:' + bg + ';border:1px solid ' + border + ';border-radius:6px;margin-bottom:6px">';
      html += '<span style="font-size:14px">' + icon + '</span>';
      html += '<span class="depot-badge ' + (depot === 'south' ? 'depot-south' : 'depot-north') + '" style="font-size:10px;padding:1px 6px">' + label + '</span>';
      html += '<span style="font-size:13px;font-weight:600;color:#e2e8f0;flex:1">Customer list</span>';
      html += '<span style="font-size:12px;color:' + textCol + '">' + (hasCL ? 'Uploaded' : 'Not uploaded') + '</span>';
      html += '</div>';
    });

    // Summary banner
    if (totalGaps > 0) {
      html += '<div style="padding:10px 16px;background:#7f1d1d44;border:1px solid #991b1b;border-radius:8px;margin:10px 0;display:flex;align-items:center;gap:10px">';
      html += '<span style="font-size:18px">\u26A0\uFE0F</span>';
      html += '<span style="font-size:13px;font-weight:600;color:#fca5a5">' + totalGaps + ' gap' + (totalGaps > 1 ? 's' : '') + ' across ' + allWeeks.length + ' weeks</span>';
      html += '<span style="font-size:12px;color:#94a3b8;margin-left:auto">' + fWk(earliest) + ' \u2192 ' + fWk(latest) + '</span>';
      html += '</div>';
    } else {
      html += '<div style="padding:10px 16px;background:#064e3b55;border:1px solid #065f46;border-radius:8px;margin:10px 0;display:flex;align-items:center;gap:10px">';
      html += '<span style="font-size:18px">\u2705</span>';
      html += '<span style="font-size:13px;font-weight:600;color:#6ee7b7">All data present across ' + allWeeks.length + ' weeks</span>';
      html += '</div>';
    }

    // Week-by-week table (most recent first)
    html += '<div style="max-height:500px;overflow-y:auto;border:1px solid #334155;border-radius:8px;margin-top:8px">';
    html += '<table style="width:100%;font-size:12px;border-collapse:collapse">';

    // Header row — one set of columns per depot
    html += '<thead><tr style="position:sticky;top:0;background:#1e293b;z-index:1">';
    html += '<th style="padding:8px 10px;text-align:left;border-bottom:2px solid #475569;white-space:nowrap">Week</th>';
    depots.forEach(depot => {
      const label = depot.charAt(0).toUpperCase() + depot.slice(1);
      const colSpan = 3; // Jobs, Revenue, Quotes
      html += '<th colspan="' + colSpan + '" style="padding:8px 6px;text-align:center;border-bottom:2px solid #475569;border-left:2px solid #475569">';
      html += '<span class="depot-badge ' + (depot === 'south' ? 'depot-south' : 'depot-north') + '" style="font-size:10px;padding:1px 8px">' + label + '</span></th>';
    });
    html += '</tr>';
    // Sub-header
    html += '<tr style="position:sticky;top:33px;background:#1e293b;z-index:1">';
    html += '<th style="padding:4px 10px;text-align:left;border-bottom:1px solid #334155;font-size:10px;color:#64748b"></th>';
    depots.forEach(() => {
      html += '<th style="padding:4px 6px;text-align:right;border-bottom:1px solid #334155;border-left:2px solid #475569;font-size:10px;color:#64748b">Jobs</th>';
      html += '<th style="padding:4px 6px;text-align:right;border-bottom:1px solid #334155;font-size:10px;color:#64748b">Revenue</th>';
      html += '<th style="padding:4px 6px;text-align:center;border-bottom:1px solid #334155;font-size:10px;color:#64748b">Quotes</th>';
    });
    html += '</tr></thead><tbody>';

    // Data rows (most recent first)
    const reversedWeeks = [...allWeeks].reverse();
    reversedWeeks.forEach(wk => {
      const isCurrent = wk === thisWeek;
      const rowBg = isCurrent ? 'background:#1e3a5f33;' : '';
      html += '<tr style="' + rowBg + 'border-bottom:1px solid #1e293b">';
      html += '<td style="padding:6px 10px;white-space:nowrap;font-weight:' + (isCurrent ? '700' : '500') + ';color:' + (isCurrent ? '#60a5fa' : '#e2e8f0') + '">' + fWk(wk) + (isCurrent ? ' <span style="font-size:9px;color:#60a5fa;vertical-align:super">NOW</span>' : '') + '</td>';

      depots.forEach(depot => {
        const jd = (jobMap[depot] || {})[wk];
        const hasJobs = jd && jd.jobs > 0;
        const jobCount = hasJobs ? jd.jobs : 0;
        const rev = hasJobs ? jd.rev : 0;

        // Jobs cell
        if (hasJobs) {
          html += '<td style="padding:6px;text-align:right;border-left:2px solid #475569;color:#6ee7b7;font-weight:600">' + jobCount.toLocaleString() + '</td>';
        } else {
          html += '<td style="padding:6px;text-align:right;border-left:2px solid #475569;background:#7f1d1d22;color:#fca5a5;font-weight:600">\u2014</td>';
        }

        // Revenue cell
        if (hasJobs) {
          html += '<td style="padding:6px;text-align:right;color:#e2e8f0">' + fGBP(rev) + '</td>';
        } else {
          html += '<td style="padding:6px;text-align:right;background:#7f1d1d22;color:#fca5a5">\u2014</td>';
        }

        // Quote status cell — 3 small dots: Converted / Non-Converted / Cancelled
        const qd = (quoteMap[depot] || {})[wk] || { conv: false, nonConv: false, canc: false };
        const dotStyle = 'display:inline-block;width:8px;height:8px;border-radius:50%;margin:0 2px;';
        const convDot = '<span title="Converted" style="' + dotStyle + 'background:' + (qd.conv ? '#6ee7b7' : '#991b1b') + '"></span>';
        const ncDot = '<span title="Non-converted" style="' + dotStyle + 'background:' + (qd.nonConv ? '#fbbf24' : '#991b1b') + '"></span>';
        const cancDot = '<span title="Cancelled" style="' + dotStyle + 'background:' + (qd.canc ? '#f87171' : '#991b1b') + '"></span>';
        const allQuotesPresent = qd.conv && qd.nonConv && qd.canc;
        const noQuotes = !qd.conv && !qd.nonConv && !qd.canc;
        const qBg = allQuotesPresent ? '' : 'background:#7f1d1d22;';
        html += '<td style="padding:6px;text-align:center;' + qBg + '">' + convDot + ncDot + cancDot + '</td>';

async function loadUploadedFiles() {
  const container = document.getElementById('uploadedFilesContainer');
  if (!container) return;
  container.innerHTML = '<div class="loading" style="min-height:60px;font-size:14px"><span class="spin"></span> Loading uploaded files...</div>';

  try {
    // Try RPC first (fast path), fall back to client-side aggregation
    let fileStats = null;
    try {
      const rpcResult = await sbAuth.rpc('get_uploaded_file_stats');
      // Supabase client returns { data, error } — check both
      if (rpcResult.error) throw new Error(rpcResult.error.message || 'RPC failed');
      if (rpcResult.data && rpcResult.data.length > 0) {
        fileStats = rpcResult.data;
      }
    } catch (rpcErr) {
      console.log('RPC unavailable (' + rpcErr.message + '), using client-side aggregation');
    }

    // Fallback: fetch lightweight columns and aggregate client-side
    if (!fileStats) {
      const allJobs = await sbFetchAll('jobs?select=source_file,depot,uploaded_at,revenue,cost');
      const fileMap = {};
      allJobs.forEach(j => {
        const sf = j.source_file || 'Unknown source';
        if (!fileMap[sf]) {
          fileMap[sf] = { source_file: sf, depot: new Set(), job_count: 0, total_revenue: 0, total_cost: 0, total_profit: 0, earliest_upload: j.uploaded_at };
        }
        fileMap[sf].depot.add(j.depot || 'unknown');
        fileMap[sf].job_count++;
        fileMap[sf].total_revenue += Number(j.revenue || 0);
        fileMap[sf].total_cost += Number(j.cost || 0);
        fileMap[sf].total_profit += (Number(j.revenue || 0) - Number(j.cost || 0));
        if (j.uploaded_at && (!fileMap[sf].earliest_upload || j.uploaded_at < fileMap[sf].earliest_upload)) {
          fileMap[sf].earliest_upload = j.uploaded_at;
        }
      });
      fileStats = Object.values(fileMap);
    }

    const files = fileStats.sort((a, b) => {
      // Sort: newest first, legacy imports at bottom
      if ((a.source_file || '').startsWith('Legacy') && !(b.source_file || '').startsWith('Legacy')) return 1;
      if (!(a.source_file || '').startsWith('Legacy') && (b.source_file || '').startsWith('Legacy')) return -1;
      return (b.earliest_upload || b.uploaded_at || '').localeCompare(a.earliest_upload || a.uploaded_at || '');
    });

    if (files.length === 0) {
      container.innerHTML = '<p style="font-size:13px;color:#64748b;padding:12px">No uploaded files found. Upload consignment logs below to get started.</p>';
      return;
    }

    const totalJobs = files.reduce((s, f) => s + (f.job_count || 0), 0);
    const totalRev = files.reduce((s, f) => s + (f.total_revenue || 0), 0);

    let html = '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px">';
    html += '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Total Files</div><div class="value" style="font-size:20px">' + files.length + '</div></div>';
    html += '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Total Jobs</div><div class="value" style="font-size:20px">' + totalJobs.toLocaleString() + '</div></div>';
    html += '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Total Revenue</div><div class="value" style="font-size:20px">' + fGBP(totalRev) + '</div></div>';
    html += '</div>';

    html += '<table style="width:100%"><thead><tr>';
    html += '<th style="text-align:left">File Name</th>';
    html += '<th>Depot</th>';
    html += '<th class="r">Jobs</th>';
    html += '<th class="r">Revenue</th>';
    html += '<th class="r">Profit</th>';
    html += '<th>Uploaded</th>';
    html += '<th style="width:90px"></th>';
    html += '</tr></thead><tbody>';

    files.forEach((f, fileIdx) => {
      // Handle depot: could be string (from fallback) or from RPC
      let depots = [];
      if (typeof f.depot === 'string') {
        depots = f.depot.split(',').map(d => d.trim()).filter(d => d);
      } else if (f.depot instanceof Set) {
        depots = [...f.depot];
      } else if (Array.isArray(f.depot)) {
        depots = f.depot;
      }

      const depotBadges = depots.sort().map(d => {
        const cls = d === 'south' ? 'depot-south' : (d === 'north' ? 'depot-north' : 'depot-admin');
        return '<span class="depot-badge ' + cls + '" style="font-size:10px;padding:1px 6px">' + d + '</span>';
      }).join(' ');

      const profit = (f.total_revenue || 0) - (f.total_cost || 0);
      const margin = (f.total_revenue || 0) > 0 ? (profit / (f.total_revenue || 1) * 100).toFixed(1) : '0.0';
      const uploadDate = (f.earliest_upload || f.uploaded_at) ? new Date(f.earliest_upload || f.uploaded_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : '—';
      const isLegacy = (f.source_file || '').startsWith('Legacy');
      const escapedName = (f.source_file || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
      const expandId = 'fileexpand_' + fileIdx;

      html += '<tr style="cursor:pointer" onclick="document.getElementById(\'' + expandId + '\').style.display = document.getElementById(\'' + expandId + '\').style.display === \'none\' ? \'table-row\' : \'none\'">';
      html += '<td style="font-weight:600;font-size:13px">\u25B6 ' + f.source_file + '</td>';
      html += '<td style="text-align:center">' + depotBadges + '</td>';
      html += '<td class="r">' + (f.job_count || 0).toLocaleString() + '</td>';
      html += '<td class="r">' + fGBP(f.total_revenue || 0) + '</td>';
      html += '<td class="r">' + fGBP(profit) + ' <span style="font-size:11px;color:#94a3b8">(' + margin + '%)</span></td>';
      html += '<td style="font-size:12px;color:#94a3b8">' + uploadDate + '</td>';
      html += '<td style="white-space:nowrap"><button class="cfg-btn cfg-btn-sm" style="background:#334155;color:#94a3b8;margin-right:4px" onclick="event.stopPropagation();loadFileWeekBreakdown(\'' + escapedName + '\', \'' + expandId + '\');document.getElementById(\'' + expandId + '\').style.display=\'table-row\'">Detail</button><button class="cfg-btn cfg-btn-danger cfg-btn-sm" onclick="event.stopPropagation();deleteSourceFile(\'' + escapedName + '\', ' + (f.job_count || 0) + ')">Delete</button></td>';
      html += '</tr>';

      // Empty expand row (will be filled on demand)
      html += '<tr id="' + expandId + '" style="display:none"><td colspan="7"><div style="padding:12px;background:#0f172a;border-radius:6px;margin:8px 0">';
      html += '<h4 style="font-size:12px;color:#94a3b8;margin-bottom:8px">Week-by-Week Breakdown for ' + f.source_file + '</h4>';
      html += '<div id="weekBreakdown_' + fileIdx + '" style="max-height:300px;overflow-y:auto;border:1px solid #334155;border-radius:6px">';
      html += '<div class="loading" style="min-height:60px;font-size:12px"><span class="spin"></span> Loading weeks...</div>';
      html += '</div>';
      html += '</div></td></tr>';
    });

    html += '</tbody></table>';
    html += '<p style="font-size:11px;color:#64748b;margin-top:8px">After deleting a file, click <strong>Rebuild Summaries</strong> below to update all aggregated data.</p>';
    container.innerHTML = html;

  } catch (e) {
    container.innerHTML = '<p style="font-size:13px;color:#fca5a5;padding:12px">Error loading uploaded files: ' + e.message + '</p>';
    console.error('loadUploadedFiles error:', e);
  }
}

async function loadFileWeekBreakdown(sourceFile, expandId) {
  const fileIdx = expandId.replace('fileexpand_', '');
  const breakdownDiv = document.getElementById('weekBreakdown_' + fileIdx);
  if (!breakdownDiv) return;

  try {
    // Fetch only week-level data for this source file
    const jobsForFile = await sbFetchAll('jobs?select=week_label,revenue,cost&source_file=eq.' + encodeURIComponent(sourceFile));
    const weekMap = {};
    jobsForFile.forEach(j => {
      const wk = j.week_label || 'Unknown week';
      if (!weekMap[wk]) {
        weekMap[wk] = { jobs: 0, revenue: 0, cost: 0, profit: 0 };
      }
      weekMap[wk].jobs++;
      weekMap[wk].revenue += Number(j.revenue || 0);
      weekMap[wk].cost += Number(j.cost || 0);
      weekMap[wk].profit += (Number(j.revenue || 0) - Number(j.cost || 0));
    });

    const weeks = Object.entries(weekMap).sort((a, b) => a[0].localeCompare(b[0]));
    let html = '<table style="font-size:11px;width:100%"><thead><tr style="sticky:top;top:0"><th style="padding:4px;text-align:left">Week</th><th class="r" style="padding:4px">Jobs</th><th class="r" style="padding:4px">Revenue</th><th class="r" style="padding:4px">Cost</th><th class="r" style="padding:4px">Profit</th><th class="r" style="padding:4px">Margin %</th></tr></thead>';
    html += '<tbody>' + weeks.map(([wk, data]) => {
      const wkMargin = data.revenue > 0 ? (data.profit / data.revenue * 100).toFixed(1) : '0.0';
      return '<tr><td style="padding:4px">' + fWk(wk) + '</td><td class="r" style="padding:4px">' + data.jobs.toLocaleString() + '</td><td class="r" style="padding:4px">' + fGBP(data.revenue) + '</td><td class="r" style="padding:4px">' + fGBP(data.cost) + '</td><td class="r" style="padding:4px">' + fGBP(data.profit) + '</td><td class="r" style="padding:4px">' + wkMargin + '%</td></tr>';
    }).join('') + '</tbody>';
    html += '</table>';
    breakdownDiv.innerHTML = html;
  } catch (e) {
    breakdownDiv.innerHTML = '<p style="color:#fca5a5;font-size:12px">Error loading breakdown: ' + e.message + '</p>';
    console.error('loadFileWeekBreakdown error:', e);
  }
}

async function deleteSourceFile(sourceFile, jobCount) {
  if (!confirm('Delete "' + sourceFile + '" and all ' + jobCount.toLocaleString() + ' associated jobs?\n\nThis cannot be undone. After deletion, click "Rebuild Summaries" to update all aggregated data.')) return;
  if (!confirm('Confirm: permanently delete ' + jobCount.toLocaleString() + ' jobs from "' + sourceFile + '"?')) return;

  console.group('🗑️ Deleting:', sourceFile);
  const container = document.getElementById('uploadedFilesContainer');
  const statusId = 'deleteFileStatus_' + Date.now();
  container.insertAdjacentHTML('afterbegin', '<div id="' + statusId + '" class="card" style="margin-bottom:12px;border-color:#7f1d1d"><h3 style="color:#fbbf24;font-size:14px">Deleting "' + sourceFile + '"...</h3><p id="' + statusId + '_msg" style="font-size:13px;color:#94a3b8">Working...</p></div>');
  const msgEl = document.getElementById(statusId + '_msg');

  try {
    // Delete jobs in batches (PostgREST has row limits)
    // Use the source_file filter
    const encodedFile = encodeURIComponent(sourceFile);

    // First delete any customer_breakdowns related to these jobs' weeks
    // (we'll let Rebuild Summaries handle re-creating them)
    msgEl.textContent = 'Deleting jobs...';

    // Delete in a loop until no more rows match (in case there are more than the PostgREST limit)
    let totalDeleted = 0;
    let batchNum = 0;
    while (true) {
      batchNum++;
      msgEl.textContent = 'Deleting jobs (batch ' + batchNum + ', ' + totalDeleted.toLocaleString() + ' deleted so far)...';
      // Delete up to 1000 at a time by fetching IDs first, then deleting by exact IDs
      const idsToDelete = await sbFetch('jobs?source_file=eq.' + encodedFile + '&select=id&limit=1000');
      if (!idsToDelete || idsToDelete.length === 0) break;

      const idList = idsToDelete.map(r => r.id);
      // Delete by exact ID list to avoid range issues
      const deleted = await sbWrite('DELETE', 'jobs?id=in.(' + idList.join(',') + ')');
      const deletedCount = Array.isArray(deleted) ? deleted.length : idList.length;
      totalDeleted += deletedCount;

      console.log('Delete batch', batchNum, ':', deletedCount, 'rows removed');

      // Safety: if nothing was actually deleted, stop to prevent infinite loop
      if (deletedCount === 0) {
        msgEl.innerHTML = '<span style="color:#fca5a5">Warning: delete returned 0 rows — possible RLS issue. ' + totalDeleted.toLocaleString() + ' deleted before stopping.</span>';
        return;
      }

      if (idsToDelete.length < 1000) break; // no more to delete

      // Brief pause to avoid hammering the API
      await new Promise(r => setTimeout(r, 50));
    }

    console.groupEnd();

    const statusEl = document.getElementById(statusId);
    statusEl.style.borderColor = '#065f46';
    statusEl.querySelector('h3').style.color = '#6ee7b7';
    statusEl.querySelector('h3').textContent = 'Deleted "' + sourceFile + '"';
    msgEl.innerHTML = '<span style="color:#6ee7b7">' + totalDeleted.toLocaleString() + ' jobs deleted.</span> Now click <strong>Rebuild Summaries</strong> to update all aggregated data.';

    toast(totalDeleted.toLocaleString() + ' jobs deleted from "' + sourceFile + '"');
    // Refresh the file list
    setTimeout(loadUploadedFiles, 500);

  } catch (e) {
    console.groupEnd();
    msgEl.innerHTML = '<span style="color:#fca5a5">Error: ' + e.message + '</span>';
    console.error('deleteSourceFile error:', e);
  }
}

async function callRpc(fnName, params) {
  await ensureFreshToken();
  const r = await fetch(SB_URL + '/rest/v1/rpc/' + fnName, {
    method: 'POST',
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + getAuthToken(),
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(params)
  });
  if (!r.ok) {
    const t = await r.text();
    let msg = t;
    try { msg = JSON.parse(t).message || t; } catch(_) {}
    throw new Error(msg);
  }
  const text = await r.text();
  return text ? JSON.parse(text) : null;
}

let parsedUploadJobs = []; // staging area for parsed jobs

function isoWeekFromDate(d) {
  // Convert JS Date to ISO week label like "2025-W09"
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  const weekNo = Math.ceil(((date - yearStart) / 86400000 + 1) / 7);
  return date.getUTCFullYear() + '-W' + String(weekNo).padStart(2, '0');
}

function excelDateToJS(serial) {
  // Excel serial date → JS Date (handles xlsx dates, CSV dates, Excel serial numbers)
  if (serial instanceof Date) {
    return isNaN(serial.getTime()) ? null : serial;
  }
  if (typeof serial === 'number') {
    // Excel serial number (e.g., 45789 = a date in 2025)
    if (serial > 30000 && serial < 60000) {
      const epoch = new Date(1899, 11, 30);
      return new Date(epoch.getTime() + serial * 86400000);
    }
    return null; // out of range
  }
  if (typeof serial === 'string') {
    const s = serial.trim();
    if (!s) return null;

    // Extract time component if present (e.g., "02-03-2026 11:13:45" → hours=11, mins=13, secs=45)
    const timeMatch = s.match(/\s+(\d{1,2}):(\d{2})(?::(\d{2}))?/);
    const hours = timeMatch ? parseInt(timeMatch[1]) : 0;
    const mins = timeMatch ? parseInt(timeMatch[2]) : 0;
    const secs = timeMatch && timeMatch[3] ? parseInt(timeMatch[3]) : 0;
    const dateOnly = s.replace(/\s+\d{1,2}:\d{2}(:\d{2})?.*$/, '');

    // 1) Check for DD/MM/YYYY or DD-MM-YYYY or DD.MM.YYYY (British format common in UK CSV exports)
    const slashMatch = dateOnly.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{4})$/);
    if (slashMatch) {
      let p1 = parseInt(slashMatch[1]), p2 = parseInt(slashMatch[2]), year = parseInt(slashMatch[3]);
      if (year < 2000 || year > 2099) return null; // sanity check
      // If first part > 12, it MUST be day (DD/MM/YYYY)
      if (p1 > 12) return new Date(year, p2 - 1, p1, hours, mins, secs);
      // If second part > 12, it MUST be month-first (MM/DD/YYYY)
      if (p2 > 12) return new Date(year, p1 - 1, p2, hours, mins, secs);
      // Ambiguous (both ≤ 12) — assume DD/MM/YYYY since Cal Delivery is UK-based
      return new Date(year, p2 - 1, p1, hours, mins, secs);
    }

    // 2) YYYY-MM-DD (ISO format)
    const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) {
      return new Date(parseInt(isoMatch[1]), parseInt(isoMatch[2]) - 1, parseInt(isoMatch[3]), hours, mins, secs);
    }

    // 3) DD/MM/YY (2-digit year)
    const shortYearMatch = dateOnly.match(/^(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2})$/);
    if (shortYearMatch) {
      let p1 = parseInt(shortYearMatch[1]), p2 = parseInt(shortYearMatch[2]), yy = parseInt(shortYearMatch[3]);
      const year = yy < 70 ? 2000 + yy : 1900 + yy;
      if (p1 > 12) return new Date(year, p2 - 1, p1, hours, mins, secs);
      if (p2 > 12) return new Date(year, p1 - 1, p2, hours, mins, secs);
      return new Date(year, p2 - 1, p1, hours, mins, secs); // assume DD/MM/YY for UK
    }

    // 4) Pure numeric string — Excel serial number saved as text in CSV
    if (/^\d+(\.\d+)?$/.test(s)) {
      const n = parseFloat(s);
      if (n > 30000 && n < 60000) {
        const epoch = new Date(1899, 11, 30);
        return new Date(epoch.getTime() + n * 86400000);
      }
      return null;
    }

    // 5) Date with month name (e.g., "13 Jan 2025", "Jan 13, 2025")
    const monthNameMatch = s.match(/(\d{1,2})\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{4})/i) ||
                           s.match(/(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\w*\s+(\d{1,2}),?\s+(\d{4})/i);
    if (monthNameMatch) {
      const d = new Date(s);
      return isNaN(d.getTime()) ? null : d;
    }

    // 6) Fallback: native Date.parse — but ONLY if it looks date-like (avoid misinterpreting random strings)
    if (s.includes('/') || s.includes('-') || s.includes(' ')) {
      const d = new Date(s);
      return isNaN(d.getTime()) ? null : d;
    }
  }
  return null;
}

// Convert any date/datetime value to a full ISO 8601 string (preserving time)
// Returns null if the value can't be parsed. Used for storing timestamps in Supabase.
function toISOTimestamp(val) {
  if (!val) return null;
  const d = (val instanceof Date) ? val : excelDateToJS(val);
  if (!d || isNaN(d.getTime())) return null;
  return d.toISOString(); // e.g. "2025-09-01T06:00:00.000Z"
}

async function handleConLogUpload(files) {
  if (!files || files.length === 0) return;
  const preview = document.getElementById('uploadPreview');
  preview.style.display = 'block';
  preview.innerHTML = '<div class="loading">Parsing files...</div>';

  console.group('📁 Parsing consignment files');
  parsedUploadJobs = [];
  const seenJobNos = new Set();
  const fileStats = [];
  let skippedDupes = 0;
  let skippedNoKey = 0;
  let skipNoCustomer = 0;
  let skipZeroRev = 0;
  let skipZeroCostHighRev = 0;
  let firstFileColumns = []; // track column names for preview

  for (const file of files) {
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });
    if (firstFileColumns.length === 0 && rows.length > 0) firstFileColumns = Object.keys(rows[0]);

    let fileJobs = 0;
    let fileRev = 0;
    const fileWeeks = new Set();

    for (const row of rows) {
      const jobNo = String(row['Job No.'] || row['job_no'] || '').trim();
      if (!jobNo) { skippedNoKey++; continue; }
      if (seenJobNos.has(jobNo)) { skippedDupes++; continue; }
      seenJobNos.add(jobNo);

      // Check for customer name
      const custName = String(row['Customer Name'] || row['customer_name'] || '').trim();
      if (!custName) { skipNoCustomer++; continue; }

      // Parse date for week label — use Ready At (actual job date), not Date (booking timestamp)
      const rawDate = row['Ready At'] || row['ready_at'] || row['Date'] || '';
      const dt = excelDateToJS(rawDate);
      const weekLabel = dt ? isoWeekFromDate(dt) : null;
      if (!weekLabel) { skippedNoKey++; continue; }

      const revenue = Number(row['Revenue'] || row['revenue'] || row['Charge'] || row['charge'] || row['Total'] || row['total'] || row['Sale Price'] || row['sale_price'] || 0);
      const cost = Number(row['Cost'] || row['cost'] || row['Sub Cost'] || row['sub_cost'] || row['Subcontractor Cost'] || 0);
      const profit = revenue - cost;

      // Data quality tracking (informational only — no jobs are skipped)
      if (revenue === 0) skipZeroRev++;
      if (cost === 0 && revenue > 0) skipZeroCostHighRev++;

      // Extract full datetime values for pattern analysis (heatmaps)
      const bookedAtRaw = row['Date'] || row['date'] || '';
      const deliveryDeadlineRaw = row['Delivery Deadline'] || row['delivery_deadline'] || '';
      const pobTimeRaw = row['POB Time'] || row['pob_time'] || '';
      const podTimeRaw = row['POD Time'] || row['pod_time'] || '';
      const milesRaw = row['Miles'] || row['miles'] || row['Actual Miles'] || row['actual_miles'] || '';

      parsedUploadJobs.push({
        week_label: weekLabel,
        job_no: jobNo,
        customer_name: custName,
        ready_at: toISOTimestamp(dt), // full datetime (was date-only before)
        booked_at: toISOTimestamp(bookedAtRaw),
        delivery_deadline: toISOTimestamp(deliveryDeadlineRaw),
        pob_time: toISOTimestamp(pobTimeRaw),
        pod_time: toISOTimestamp(podTimeRaw),
        actual_miles: milesRaw !== '' && !isNaN(Number(milesRaw)) ? Math.round(Number(milesRaw)) : null,
        sales_name: String(row['Sales Name'] || row['sales_name'] || '').trim(),
        vehicle: String(row['Vehicle'] || row['vehicle'] || '').trim(),
        collection_postcode: String(row['Collection Postcode'] || row['collection_postcode'] || '').trim(),
        delivery_postcode: String(row['Delivery Postcode'] || row['delivery_postcode'] || '').trim(),
        revenue: revenue,
        cost: cost,
        profit: profit,
        supplier: String(row['Supplier'] || row['supplier'] || row['Sub Name'] || row['sub_name'] || row['Subcontractor'] || '').trim(),
        call_sign: String(row['Call Sign'] || row['call_sign'] || row['Callsign'] || row['callsign'] || row['Call sign'] || '').trim(),
        _rawDate: String(rawDate), // keep for debugging in preview
        _parsedDate: dt ? dt.toISOString().split('T')[0] : 'FAILED',
        _source_file: file.name  // track which file this job came from
      });

      fileJobs++;
      fileRev += revenue;
      fileWeeks.add(weekLabel);
    }

    fileStats.push({
      name: file.name,
      jobs: fileJobs,
      revenue: fileRev,
      weeks: fileWeeks.size,
      weekRange: fileWeeks.size > 0 ? fWk([...fileWeeks].sort()[0]) + ' to ' + fWk([...fileWeeks].sort().pop()) : 'N/A'
    });

    console.log('📄 File:', file.name, '→', fileJobs, 'jobs,', fGBP(fileRev), 'revenue');
  }

  console.log('✅ Total parsed:', parsedUploadJobs.length, 'jobs, skipped:', skippedDupes, 'dupes,', skippedNoKey, 'no key');
  console.groupEnd();

  // Summary
  const allWeeks = new Set(parsedUploadJobs.map(j => j.week_label));
  const totalRev = parsedUploadJobs.reduce((s, j) => s + j.revenue, 0);
  const totalProfit = parsedUploadJobs.reduce((s, j) => s + j.profit, 0);
  const repCounts = {};
  parsedUploadJobs.forEach(j => {
    repCounts[j.sales_name || '(empty)'] = (repCounts[j.sales_name || '(empty)'] || 0) + 1;
  });
  const topReps = Object.entries(repCounts).sort((a, b) => b[1] - a[1]).slice(0, 8);

  // Detect column names found in first file
  const detectedCols = firstFileColumns;
  const colSet = new Set(detectedCols.map(c => c.toLowerCase()));
  const dateCol = detectedCols.find(c => c === 'Ready At') || detectedCols.find(c => c === 'ready_at') || detectedCols.find(c => c === 'Date') || '???';
  const revCol = detectedCols.find(c => c === 'Revenue') || detectedCols.find(c => c === 'revenue') || detectedCols.find(c => c === 'Charge') || detectedCols.find(c => c === 'Total') || detectedCols.find(c => c === 'Sale Price') || '???';
  const costCol = detectedCols.find(c => c === 'Cost') || detectedCols.find(c => c === 'cost') || detectedCols.find(c => c === 'Sub Cost') || '???';

  // Date parsing samples (first 8 jobs to verify dates are correct)
  const dateSamples = parsedUploadJobs.slice(0, 8);

  // Build week-by-week breakdown
  const weekBreakdown = {};
  parsedUploadJobs.forEach(j => {
    if (!weekBreakdown[j.week_label]) {
      weekBreakdown[j.week_label] = { jobs: 0, revenue: 0, cost: 0, profit: 0 };
    }
    weekBreakdown[j.week_label].jobs++;
    weekBreakdown[j.week_label].revenue += j.revenue;
    weekBreakdown[j.week_label].cost += j.cost;
    weekBreakdown[j.week_label].profit += j.profit;
  });

  const weekRows = Object.entries(weekBreakdown)
    .map(([week, data]) => ({
      week,
      jobs: data.jobs,
      revenue: data.revenue,
      cost: data.cost,
      profit: data.profit,
      margin: data.revenue > 0 ? (data.profit / data.revenue * 100).toFixed(1) : '0.0'
    }))
    .sort((a, b) => a.week.localeCompare(b.week));

  // Check for suspicious dates (future dates, very old dates)
  const now = new Date();
  const futureJobs = parsedUploadJobs.filter(j => {
    const parts = j._parsedDate.split('-');
    if (parts.length < 3) return false;
    const d = new Date(parts[0], parts[1] - 1, parts[2]);
    return d > now;
  });
  const veryOldJobs = parsedUploadJobs.filter(j => j._parsedDate < '2020-01-01');
  const hasSuspiciousDates = futureJobs.length > 50 || veryOldJobs.length > 50;

  // Data quality checks
  const weeksWithZeroRev = weekRows.filter(w => w.revenue <= 0).length;
  const weeksWithFewJobs = weekRows.filter(w => w.jobs < 10 && weekRows.some(wr => wr.jobs > 100)).length;
  const jobsWithZeroCost = parsedUploadJobs.filter(j => j.cost === 0 && j.revenue > 0).length;

  preview.innerHTML = `
    <div class="card">
      <h3 style="margin-bottom:12px">Upload Preview — ${parsedUploadJobs.length.toLocaleString()} unique jobs parsed
        <span class="depot-badge ${(document.getElementById('uploadDepot')?.value || 'north') === 'south' ? 'depot-south' : 'depot-north'}" style="margin-left:12px;font-size:12px">${(document.getElementById('uploadDepot')?.value || 'north').toUpperCase()} DEPOT</span>
      </h3>
      <div style="display:flex;gap:24px;flex-wrap:wrap;margin-bottom:16px">
        <div class="kpi" style="flex:1;min-width:120px"><div class="label">Unique Jobs</div><div class="value" style="font-size:20px;color:#6ee7b7">${parsedUploadJobs.length.toLocaleString()}</div></div>

async function uploadParsedJobs() {
  if (parsedUploadJobs.length === 0) { toast('No jobs parsed. Upload a file first.', true); return; }
  const uploadDepot = document.getElementById('uploadDepot')?.value || getWriteDepot();
  if (!confirm('Upload ' + parsedUploadJobs.length.toLocaleString() + ' jobs to Supabase as ' + uploadDepot.toUpperCase() + ' depot?\n\nThis will ADD jobs to the existing data. If you want to replace all data, click "Delete All Jobs" first.')) return;
  // Stamp depot and upload metadata on all parsed jobs
  const uploadTimestamp = new Date().toISOString();
  parsedUploadJobs.forEach(j => {
    j.depot = uploadDepot;
    j.source_file = j._source_file || 'Manual upload';
    j.uploaded_at = uploadTimestamp;
  });

  console.group('⬆️ Uploading to Supabase');
  const progress = document.getElementById('uploadProgress');
  progress.style.display = 'block';
  const batchSize = 500;
  const total = parsedUploadJobs.length;
  let uploaded = 0;
  let errors = 0;
  let batchNum = 0;

  progress.innerHTML = '<div class="card"><h3>Uploading...</h3><div id="uploadBar" style="background:#334155;border-radius:6px;height:24px;overflow:hidden;margin:12px 0"><div id="uploadBarFill" style="background:#3b82f6;height:100%;width:0%;transition:width 0.3s;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white"></div></div><p id="uploadStatus" style="font-size:13px;color:#94a3b8"></p></div>';

  // ── Create stub weekly_summaries rows so FK constraint is satisfied ──
  document.getElementById('uploadStatus').textContent = 'Creating weekly summary stubs...';
  const uniqueWeeks = [...new Set(parsedUploadJobs.map(j => j.week_label))].sort();
  // Create stubs using upsert (ignore-duplicates) — safely skips any that already exist
  const stubs = uniqueWeeks.map(wk => {
    const [y, w] = [parseInt(wk.split('-W')[0]), parseInt(wk.split('-W')[1])];
    const jan4 = new Date(y, 0, 4);
    const mon = new Date(jan4.getTime() - ((jan4.getDay() + 6) % 7) * 86400000 + (w - 1) * 7 * 86400000);
    const ws = mon.toISOString().split('T')[0];
    return { week_label: wk, week_start: ws, depot: uploadDepot, job_count: 0, total_revenue: 0, total_cost: 0, total_profit: 0, margin_pct: 0 };
  });
  if (stubs.length > 0) {
    for (let i = 0; i < stubs.length; i += 500) {
      // Use ignore-duplicates: skip any stubs that already exist (avoids unique constraint errors)
      await ensureFreshToken();
      const r = await fetch(SB_URL + '/rest/v1/weekly_summaries', {
        method: 'POST',
        headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken(), 'Content-Type': 'application/json', 'Prefer': 'resolution=ignore-duplicates,return=minimal' },
        body: JSON.stringify(stubs.slice(i, i + 500))
      });
      if (!r.ok && r.status !== 409) { const t = await r.text(); console.warn('Stub creation warning:', t); }
    }
    console.log('Created/skipped ' + stubs.length + ' weekly_summary stubs for depot ' + uploadDepot);
  }

  for (let i = 0; i < total; i += batchSize) {
    batchNum++;
    const batch = parsedUploadJobs.slice(i, i + batchSize).map(j => {
      const { _rawDate, _parsedDate, _source_file, profit, ...rest } = j; // strip debug, internal fields, and generated columns (profit is computed by Supabase)
      return rest;
    });
    try {
      const result = await sbWrite('POST', 'jobs', batch);
      const insertedCount = Array.isArray(result) ? result.length : batch.length;
      uploaded += insertedCount;
      console.log('Batch', batchNum, ':', batch.length, 'jobs → inserted', insertedCount);
      if (insertedCount === 0 && batch.length > 0) {
        errors += batch.length;
        console.error('Batch at offset', i, ': POST returned 0 rows — RLS may be blocking inserts');
      }
    } catch(e) {
      errors += batch.length;
      console.error('Batch error at offset', i, e);
    }
    const pct = Math.round(((i + batch.length) / total) * 100);
    document.getElementById('uploadBarFill').style.width = pct + '%';
    document.getElementById('uploadBarFill').textContent = pct + '%';
    document.getElementById('uploadStatus').textContent = `${uploaded.toLocaleString()} uploaded, ${errors > 0 ? errors + ' errors, ' : ''}${(total - uploaded - errors).toLocaleString()} remaining...`;
  }

  // Verify rows actually persisted
  let verifyCount = 0;
  try {
    const verify = await sbFetch('jobs?select=id&limit=1&offset=0');
    const countRes = await fetch(SB_URL + '/rest/v1/jobs?select=id', {
      method: 'HEAD',
      headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + getAuthToken(), 'Prefer': 'count=exact' }
    });
    const range = countRes.headers.get('content-range');
    verifyCount = range ? parseInt(range.split('/')[1]) || 0 : 0;
  } catch(e) { console.error('Verify count failed:', e); }

  console.log('✅ Upload complete. Verified:', verifyCount, 'jobs in database');
  console.groupEnd();

  const verified = verifyCount > 0;
  const verifyMsg = verified
    ? ` Verified: ${verifyCount.toLocaleString()} jobs in database.`
    : ' <span style="color:#fca5a5">WARNING: Database appears empty after upload — check Supabase RLS policies.</span>';

  const sourceFiles = [...new Set(parsedUploadJobs.map(j => j.source_file))];
  document.getElementById('uploadStatus').innerHTML = `<span style="color:${errors > 0 ? '#fbbf24' : '#6ee7b7'}">Done! ${uploaded.toLocaleString()} jobs uploaded${errors > 0 ? ', ' + errors + ' failed' : ''}.</span>${verifyMsg} <button class="cfg-btn cfg-btn-primary cfg-btn-sm" onclick="showUploadAudit([${sourceFiles.map(f => '\'' + f.replace(/'/g, "\\'") + '\'').join(',')}])" style="margin-left:12px">Show Upload Audit</button> <button class="cfg-btn cfg-btn-primary cfg-btn-sm" onclick="location.reload()" style="margin-left:6px">Reload Dashboard</button>`;
  toast(uploaded.toLocaleString() + ' jobs uploaded to Supabase');
}

async function showUploadAudit(sourceFiles) {
  const progress = document.getElementById('uploadProgress');
  progress.innerHTML = '<div class="card"><h3>Upload Audit Comparison</h3><div id="auditStatus" style="font-size:13px;color:#94a3b8">Loading...</div></div>';

  try {
    // Build filter for source_files
    const fileFilter = sourceFiles.map(f => 'source_file=eq.' + encodeURIComponent(f)).join('&or=');

    // Fetch DB records
    const dbJobs = await sbFetchAll('jobs?select=week_label,revenue,cost&' + fileFilter);

    // Group DB jobs by week
    const dbWeekData = {};
    dbJobs.forEach(j => {
      if (!dbWeekData[j.week_label]) {
        dbWeekData[j.week_label] = { jobs: 0, revenue: 0, cost: 0, profit: 0 };
      }
      dbWeekData[j.week_label].jobs++;
      dbWeekData[j.week_label].revenue += Number(j.revenue || 0);
      dbWeekData[j.week_label].cost += Number(j.cost || 0);
      dbWeekData[j.week_label].profit += (Number(j.revenue || 0) - Number(j.cost || 0));
    });

    // Build comparison
    const allWeeks = new Set([
      ...Object.keys(dbWeekData),
      ...parsedUploadJobs.map(j => j.week_label)
    ]);

    const comparisonRows = [];
    for (const week of [...allWeeks].sort()) {
      const parsed = parsedUploadJobs.filter(j => j.week_label === week);
      const parsed_jobs = parsed.length;
      const parsed_rev = parsed.reduce((s, j) => s + j.revenue, 0);
      const db_jobs = (dbWeekData[week]?.jobs) || 0;
      const db_rev = (dbWeekData[week]?.revenue) || 0;
      const jobMatch = parsed_jobs === db_jobs;
      const revMatch = Math.abs(parsed_rev - db_rev) < 1; // allow 1p rounding

      comparisonRows.push({
        week,
        parsed_jobs,
        db_jobs,
        parsed_rev,
        db_rev,
        jobMatch,
        revMatch,
        match: jobMatch && revMatch
      });
    }

    const allMatch = comparisonRows.every(r => r.match);
    const html = `<div style="margin-top:12px">
      ${allMatch ? '<div style="padding:10px;background:#064e3b33;border-radius:6px;margin-bottom:12px"><p style="font-size:12px;color:#6ee7b7;font-weight:600">\u2705 Perfect match: parsed data matches database exactly!</p></div>' : '<div style="padding:10px;background:#fbbf2433;border-radius:6px;margin-bottom:12px"><p style="font-size:12px;color:#fbbf24;font-weight:600">\u26A0 Discrepancies detected — check red rows below</p></div>'}
      <table style="font-size:12px;width:100%;overflow-x:auto"><thead><tr><th style="padding:4px">Week</th><th class="r" style="padding:4px">Parsed Jobs</th><th class="r" style="padding:4px">DB Jobs</th><th class="r" style="padding:4px">Parsed Revenue</th><th class="r" style="padding:4px">DB Revenue</th><th style="padding:4px">Status</th></tr></thead>
      <tbody>${comparisonRows.map(r => `<tr style="background:${r.match ? 'transparent' : '#7f1d1d33'}"><td style="padding:4px">${fWk(r.week)}</td><td class="r" style="padding:4px;color:${r.jobMatch ? '#6ee7b7' : '#fca5a5'}">${r.parsed_jobs}</td><td class="r" style="padding:4px;color:${r.jobMatch ? '#6ee7b7' : '#fca5a5'}">${r.db_jobs}</td><td class="r" style="padding:4px;color:${r.revMatch ? '#6ee7b7' : '#fca5a5'}">\u00A3${r.parsed_rev.toLocaleString('en-GB', {minimumFractionDigits:0,maximumFractionDigits:0})}</td><td class="r" style="padding:4px;color:${r.revMatch ? '#6ee7b7' : '#fca5a5'}">\u00A3${r.db_rev.toLocaleString('en-GB', {minimumFractionDigits:0,maximumFractionDigits:0})}</td><td style="padding:4px">${r.match ? '\u2705' : '\u274C'}</td></tr>`).join('')}</tbody>
      </table>
    </div>`;

    document.getElementById('auditStatus').innerHTML = html;
  } catch(e) {
    console.error('showUploadAudit error:', e);
    document.getElementById('auditStatus').innerHTML = '<span style="color:#fca5a5">Error: ' + e.message + '</span>';
  }
}

let parsedCustList = [];

async function handleCustListUpload(files) {
  if (!files || files.length === 0) return;
  const preview = document.getElementById('custListPreview');
  preview.style.display = 'block';
  preview.innerHTML = '<div class="loading">Parsing customer list...</div>';
  parsedCustList = [];

  try {
    const file = files[0];
    const data = await file.arrayBuffer();
    const wb = XLSX.read(data, { type: 'array', cellDates: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = XLSX.utils.sheet_to_json(ws, { defval: '' });

    const depot = document.getElementById('custListDepot')?.value || 'north';

    for (const row of rows) {
      const name = String(row['Customer Name'] || row['customer_name'] || row['Name'] || row['name'] || row['Account'] || row['account'] || '').trim();
      if (!name) continue;

      // Parse start date — handle various formats
      let startDate = '';
      const rawDate = row['Start Date'] || row['start_date'] || row['Date Added'] || row['date_added'] || row['Start'] || '';
      if (rawDate) {
        const dt = excelDateToJS(rawDate);

      parsedCustList.push({ customer_name: name, depot, start_date: startDate || null, assigned_rep: rep || null, commission_months: commMonths || null, notes: notes || null });
    }

    const withDates = parsedCustList.filter(c => c.start_date).length;

          <div class="kpi" style="flex:1;min-width:120px"><div class="label">With Reps</div><div class="value" style="font-size:20px;color:#c084fc">${withReps}</div></div>
        </div>

async function uploadCustList() {
  if (parsedCustList.length === 0) { toast('No customers parsed.', true); return; }
  const mode = confirm('OK: MERGE with existing overrides (update matches, add new)\nCancel: REPLACE all overrides for this depot') ? 'merge' : 'replace';

  try {
    const depot = parsedCustList[0]?.depot || 'north';

    if (mode === 'replace') {
      // Delete existing overrides for this depot
      await sbWrite('DELETE', 'account_overrides?depot=eq.' + depot);
    }

    // Upsert each customer into account_overrides
    const rows = parsedCustList.map(c => {
      const obj = { customer_name: c.customer_name, depot: c.depot };
      if (c.start_date) obj.start_date = c.start_date;
      if (c.assigned_rep) obj.assigned_rep = c.assigned_rep;
      if (c.commission_months) obj.commission_months = c.commission_months;
      if (c.notes) obj.notes = c.notes;
      return obj;
    });

    for (let i = 0; i < rows.length; i += 500) {
      if (mode === 'merge') {
        await sbUpsert('account_overrides', 'customer_name,depot', rows.slice(i, i + 500));
      } else {
        await sbWrite('POST', 'account_overrides', rows.slice(i, i + 500));

let parsedQConverted = [];
let parsedQNonConverted = [];
let parsedQCancelled = [];

function standardiseReasonCode(reason) {
  const m = String(reason || '').trim().match(/^rc\s*([1-5])$/i);
  return m ? 'RC' + m[1] : 'Non-Compliant';
}

function normaliseQName(name) {
  return (name || '').toLowerCase().trim().replace(/[..\u2019'@\u00AC]/g, '');
}

function quoteFileChanged() {
  const f1 = document.getElementById('qfConverted')?.files[0];
  const f2 = document.getElementById('qfNonConverted')?.files[0];

  document.getElementById('quoteFileCount').textContent = count + ' of 3 files selected';
  document.getElementById('btnProcessQuotes').disabled = count === 0;
  if (f1) document.getElementById('qfConvertedInfo').textContent = f1.name;
  if (f2) document.getElementById('qfNonConvertedInfo').textContent = f2.name;
  if (f3) document.getElementById('qfCancelledInfo').textContent = f3.name;
}

async function processQuoteFiles() {
  const preview = document.getElementById('quotePreview');
  preview.style.display = 'block';
  preview.innerHTML = '<div class="loading"><span class="spin"></span> Parsing quote files...</div>';
  parsedQConverted = [];
  parsedQNonConverted = [];
  parsedQCancelled = [];

  try {
    const depot = document.getElementById('quoteDepot')?.value || 'north';

    async function parseXL(inputId) {
      const file = document.getElementById(inputId)?.files[0];
      if (!file) return [];
      const data = await file.arrayBuffer();
      const wb = XLSX.read(data, { type: 'array', cellDates: true });
      return XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: '' });
    }

    const convRows = await parseXL('qfConverted');
    const ncRows = await parseXL('qfNonConverted');
    const canRows = await parseXL('qfCancelled');

    // Process converted quotes
    convRows.forEach(row => {
      const customer = String(row['Company Name'] || '').trim();
      if (!customer) return;
      const d = row['Quote Created On'];
      const dt = d instanceof Date ? d : (d ? new Date(d) : null);
      const bd = row['Quote Booked On'];
      const bdt = bd instanceof Date ? bd : (bd ? new Date(bd) : null);
      parsedQConverted.push({
        our_ref: String(row['Our Ref.'] || row['Our Ref'] || '').trim(),
        customer_name: customer,
        account_code: String(row['Account Code'] || ''),
        sales_name: String(row['Sales Name'] || '').trim(),
        quote_created_on: dt && !isNaN(dt) ? dt.toISOString() : null,
        quote_booked_on: bdt && !isNaN(bdt) ? bdt.toISOString() : null,
        quote_issued_by: String(row['Quote Issued By'] || '').trim(),
        quote_converted_by: String(row['Quote Converted By'] || '').trim(),
        income: parseFloat(String(row['Income \u00A3'] || row['Income'] || 0).toString().replace(/[^0-9.-]/g, '')) || 0,
        tariff: String(row['Tariff'] || '').trim(),
        depot: depot,
        source_file: document.getElementById('qfConverted')?.files[0]?.name || '',
        week_label: dt && !isNaN(dt) ? isoWeekFromDate(dt) : null,
      });
    });

    // Build cancelled ref set (Q-prefix only) for deduplication
    const cancelledQRefs = new Set();
    canRows.forEach(row => {
      const ref = String(row['Our Ref'] || row['Our Ref.'] || '').trim().toUpperCase();
      if (ref.startsWith('Q')) cancelledQRefs.add(ref);
    });

    // Process non-converted quotes (exclude those in cancelled set)
    ncRows.forEach(row => {
      const qRef = String(row['Quote No.'] || row['Quote No'] || '').trim().toUpperCase();
      if (cancelledQRefs.has(qRef)) return; // counted in cancelled only
      const customer = String(row['Customer Name'] || '').trim();
      if (!customer) return;
      const d = row['Quote Created On'];
      const dt = d instanceof Date ? d : (d ? new Date(d) : null);
      parsedQNonConverted.push({
        quote_no: String(row['Quote No.'] || row['Quote No'] || '').trim(),
        customer_name: customer,
        account_code: String(row['Account Code'] || ''),
        sales_name: String(row['Sales Name'] || '').trim(),
        quote_created_on: dt && !isNaN(dt) ? dt.toISOString() : null,
        quote_issued_by: String(row['Quote Issued By'] || '').trim(),
        income: parseFloat(String(row['Income \u00A3'] || row['Income'] || 0).toString().replace(/[^0-9.-]/g, '')) || 0,
        tariff: String(row['Tariff'] || '').trim(),
        depot: depot,
        source_file: document.getElementById('qfNonConverted')?.files[0]?.name || '',
        week_label: dt && !isNaN(dt) ? isoWeekFromDate(dt) : null,
      });
    });

    // Process cancelled — only Q-prefix Our Ref (cancelled quotes, not cancelled bookings)
    canRows.forEach(row => {
      const ref = String(row['Our Ref'] || row['Our Ref.'] || '').trim().toUpperCase();
      if (!ref.startsWith('Q')) return; // BT/S-prefix = booking cancellation, skip
      const customer = String(row['Customer'] || row['Customer Name'] || '').trim();
      if (!customer) return;
      const d = row['Cancellation Date'];
      const dt = d instanceof Date ? d : (d ? new Date(d) : null);
      const reasonRaw = String(row['Cancellation Reason'] || '').trim();
      parsedQCancelled.push({
        our_ref: ref,
        cust_ref: String(row['Cust. Ref'] || row['Cust Ref'] || '').trim(),
        customer_name: customer,
        cancellation_date: dt && !isNaN(dt) ? dt.toISOString() : null,
        cancellation_reason: reasonRaw,
        reason_code: standardiseReasonCode(reasonRaw),
        value: parseFloat(String(row['Value \u00A3'] || row['Value'] || 0).toString().replace(/[^0-9.-]/g, '')) || 0,
        depot: depot,
        source_file: document.getElementById('qfCancelled')?.files[0]?.name || '',
        week_label: dt && !isNaN(dt) ? isoWeekFromDate(dt) : null,
      });
    });

    const total = parsedQConverted.length + parsedQNonConverted.length + parsedQCancelled.length;
    const convRate = total > 0 ? (parsedQConverted.length / total * 100).toFixed(1) : '0.0';
    const convRev = parsedQConverted.reduce((s, q) => s + q.income, 0);
    const ncRev = parsedQNonConverted.reduce((s, q) => s + q.income, 0);
    const canRev = parsedQCancelled.reduce((s, q) => s + q.value, 0);

    preview.innerHTML = '<div class="card">' +
      '<h3>Quote Data Preview <span class="depot-badge ' + (depot === 'south' ? 'depot-south' : 'depot-north') + '" style="margin-left:12px;font-size:12px">' + depot.toUpperCase() + '</span></h3>' +
      '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">' +
      '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Converted</div><div class="value" style="font-size:20px;color:#6ee7b7">' + parsedQConverted.length.toLocaleString() + '</div><div class="label">' + fGBP(convRev) + '</div></div>' +
      '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Non-Converted</div><div class="value" style="font-size:20px;color:#fbbf24">' + parsedQNonConverted.length.toLocaleString() + '</div><div class="label">' + fGBP(ncRev) + '</div></div>' +
      '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Cancelled (Q-ref)</div><div class="value" style="font-size:20px;color:#fca5a5">' + parsedQCancelled.length.toLocaleString() + '</div><div class="label">' + fGBP(canRev) + '</div></div>' +
      '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Total Quotes</div><div class="value" style="font-size:20px;color:#e2e8f0">' + total.toLocaleString() + '</div></div>' +
      '<div class="kpi" style="flex:1;min-width:120px"><div class="label">Conversion Rate</div><div class="value" style="font-size:20px;color:#60a5fa">' + convRate + '%</div></div>' +
      '</div>' +
      '<p style="font-size:11px;color:#64748b">Skipped ' + (canRows.length - parsedQCancelled.length) + ' non-quote cancellations (BT/S-prefix bookings). Excluded ' + cancelledQRefs.size + ' cancelled Q-refs from non-converted count.</p>' +
      '</div>';

    document.getElementById('btnUploadQuotes').disabled = total === 0;
  } catch(e) {
    preview.innerHTML = '<p style="color:#f87171;padding:12px">Error parsing files: ' + e.message + '</p>';
    console.error('Quote parse error:', e);
  }
}

// ── Quote Conversion Tab ──
function buildQuoteCustomerData() {
  if (!quoteData) return [];
  const depotActive = selectedDepot !== 'both';
  const depotMatch = (d) => !depotActive || d === selectedDepot;
  const validWeeks = (DATA.weeks && DATA.weeks.length > 0) ? new Set(DATA.weeks.map(w => w.week_label)) : null; // null = show all

  const custMap = {};
  function ensure(key, name, sales) {
    if (!custMap[key]) custMap[key] = { customerName: name, salesName: '', convertedQuotes: [], nonConvertedQuotes: [], cancelledQuotes: [] };
    if (sales) custMap[key].salesName = custMap[key].salesName || sales;
  }

  // Converted
  quoteData.converted.filter(q => depotMatch(q.depot) && (!validWeeks || !q.week_label || validWeeks.has(q.week_label))).forEach(q => {
    const key = normaliseQName(q.customer_name);
    if (!key) return;
    ensure(key, q.customer_name, q.sales_name);
    custMap[key].convertedQuotes.push({ date: q.quote_created_on, revenue: Number(q.income || 0) });
  });

  // Non-converted
  quoteData.nonConverted.filter(q => depotMatch(q.depot) && (!validWeeks || !q.week_label || validWeeks.has(q.week_label))).forEach(q => {
    const key = normaliseQName(q.customer_name);
    if (!key) return;
    ensure(key, q.customer_name, q.sales_name);
    custMap[key].nonConvertedQuotes.push({ date: q.quote_created_on, revenue: Number(q.income || 0) });
  });

  // Cancelled (already Q-prefix filtered at upload)
  quoteData.cancelled.filter(q => depotMatch(q.depot) && (!validWeeks || !q.week_label || validWeeks.has(q.week_label))).forEach(q => {
    const key = normaliseQName(q.customer_name);
    if (!key) return;
    ensure(key, q.customer_name, '');
    custMap[key].cancelledQuotes.push({ date: q.cancellation_date, revenue: Number(q.value || 0), reasonCode: q.reason_code || 'Non-Compliant' });
  });

  return Object.values(custMap).map(c => {
    const conv = c.convertedQuotes.length;
    const nc = c.nonConvertedQuotes.length;
    const can = c.cancelledQuotes.length;
    const total = conv + nc + can;
    const convRev = c.convertedQuotes.reduce((s, q) => s + q.revenue, 0);
    const ncRev = c.nonConvertedQuotes.reduce((s, q) => s + q.revenue, 0);
    const canRev = c.cancelledQuotes.reduce((s, q) => s + q.revenue, 0);
    const rate = total > 0 ? (conv / total * 100) : 0;
    const reasons = {};
    c.cancelledQuotes.forEach(q => { reasons[q.reasonCode] = (reasons[q.reasonCode] || 0) + 1; });
    const topReason = can > 0 ? (Object.entries(reasons).sort((a, b) => b[1] - a[1])[0]?.[0] || '\u2014') : '\u2014';
    return {
      customerName: c.customerName, salesName: c.salesName,
      convertedCount: conv, nonConvertedCount: nc, cancelledCount: can, totalQuotes: total,
      convertedRevenue: convRev, nonConvertedRevenue: ncRev, cancelledRevenue: canRev,
      conversionRate: rate, cancellationReasons: reasons, topReason
    };
  });
}

  el.innerHTML = '<div class="range-info">' + depotLabel + ' \u00B7 ' + totalQuotes.toLocaleString() + ' total quotes \u00B7 ' + customers.length + ' customers</div>' +

    // KPI row

    // Cancellation reason chart

    '<div style="display:flex;gap:24px;flex-wrap:wrap;align-items:center">' +
